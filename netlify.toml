[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/*"
  to = "https://nexthello.co.uk/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = "nexthellow.netlify.app"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
