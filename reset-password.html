<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>Reset Your Password</h2>

  <input type="password" id="password" placeholder="Enter new password" style="padding:10px; width:250px;"><br><br>
  
  <button onclick="updatePassword()" style="padding:10px 20px;">Update Password</button>

  <p id="message"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
   const supabase = supabase.createClient(
  'https://gmjipbdvcbmrkqaktguw.supabase.co',
  'sb_publishable_8AujhBw0ReInxQlvV2t55A_nNdIyjmg'
);

    async function updatePassword() {
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        document.getElementById('message').innerText = error.message;
      } else {
        document.getElementById('message').innerText = "Password updated successfully!";
      }
    }
  </script>

</body>
</html>
