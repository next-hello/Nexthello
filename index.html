// ── Supabase Auth & Data helpers ──────────────────────────
const auth = {
  signUp: (email, password) => sb.auth.signUp({ email, password }),
  signIn: (email, password) => sb.auth.signInWithPassword({ email, password }),
  signOut: () => sb.auth.signOut(),
  getUser: () => sb.auth.getUser(),
  onAuthChange: (cb) => sb.auth.onAuthStateChange(cb),
};

const db = {
  saveProfile: (profile) => sb.from('profiles').upsert(profile),
  getProfiles: () => sb.from('profiles').select('*'),
  getProfile: (id) => sb.from('profiles').select('*').eq('id', id).maybeSingle(),
  getMessages: (userId, otherId) => sb.from('messages').select('*')
    .or(`and(sender_id.eq.${userId},recipient_id.eq.${otherId}),and(sender_id.eq.${otherId},recipient_id.eq.${userId})`)
    .order('created_at', { ascending: true }),
  sendMessage: (msg) => sb.from('messages').insert(msg),
  sendHello: async (fromUser, toUser) => {
    return await sb.rpc('send_hello', { p_from: fromUser, p_to: toUser });
  },
  // Get hellos received by user — with sender profile
  getHellosReceived: async (userId) => {
    const { data, error } = await sb.from('hellos').select('*').eq('to_user', userId);
    if (error) return { data: [], error };
    if (!data || data.length === 0) return { data: [] };
    // Fetch sender profiles separately
    const senderIds = [...new Set(data.map(h => h.from_user))];
    if (senderIds.length === 0) return { data: [] };
    const { data: profiles } = await sb.from('profiles').select('*').in('id', senderIds);
    const profileMap = {};
    (profiles || []).forEach(p => { profileMap[p.id] = p; });
    return { data: data.map(h => ({ ...h, sender: profileMap[h.from_user] || null })) };
  },
  // Get hellos sent by user
  getHellosSent: async (userId) => {
    const { data, error } = await sb.from('hellos').select('to_user').eq('from_user', userId);
    return { data: data || [], error };
  },
  // Check if mutual hello exists
  checkMutualHello: async (userA, userB) => {
    const { data: a } = await sb.from('hellos').select('id').eq('from_user', userA).eq('to_user', userB);
    const { data: b } = await sb.from('hellos').select('id').eq('from_user', userB).eq('to_user', userA);
    return (a && a.length > 0) && (b && b.length > 0);
  },
  getEvents: () => sb.from('events').select('*').order('created_at', { ascending: false }),
  createEvent: (event) => sb.from('events').insert(event),
  // Community interests
  getCommunityInterests: () => sb.from('custom_interests').select('interest, count').eq('approved', true).order('count', { ascending: false }),
  submitCustomInterest: async (interest, userId) => {
    // Upsert — if exists increment count, if new insert
    const { data: existing } = await sb.from('custom_interests').select('id, count').eq('interest', interest).maybeSingle();
    if (existing) {
      return sb.from('custom_interests').update({ count: existing.count + 1 }).eq('id', existing.id);
    } else {
      return sb.from('custom_interests').insert({ interest, submitted_by: userId, count: 1 });
    }
  },
  // Soft delete / deactivate / delete account
  pauseProfile: (userId) => sb.from('profiles').update({ status: 'paused', status_until: new Date(Date.now() + 30*24*60*60*1000).toISOString() }).eq('id', userId),
  deactivateProfile: (userId) => sb.from('profiles').update({ status: 'deactivated' }).eq('id', userId),
  deleteAccount: async (userId) => {
    // Retain email in separate table before deleting
    const { data: p } = await sb.from('profiles').select('first_name, last_name').eq('id', userId).maybeSingle();
    await sb.from('deleted_members').upsert({ user_id: userId, deleted_at: new Date().toISOString(), first_name: p?.first_name, last_name: p?.last_name });
    await sb.from('profiles').delete().eq('id', userId);
    await sb.auth.signOut();
  },
};

// ── Login Screen ──────────────────────────────────────────
function LoginScreen({ onBack, onSuccess }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const [resetSent, setResetSent] = useState(false);
  const [resetEmail, setResetEmail] = useState('');
  const [rememberMe, setRememberMe] = useState(true);

  const submit = async () => {
    if (!email||!pass) { setErr('Please fill in all fields.'); return; }
    setLoading(true); setErr('');
    const { error } = await auth.signIn(email, pass);
    if (error) { setErr(error.message); setLoading(false); }
    else {
      // Store remember me preference
      if (rememberMe) {
        localStorage.setItem('nh_remember_me', '1');
      } else {
        localStorage.removeItem('nh_remember_me');
        // Sign out when tab/window closes if not remembering
        window.addEventListener('beforeunload', () => sb.auth.signOut(), { once: true });
      }
      onSuccess();
    }
  };

  const sendReset = async () => {
    const e = resetEmail || email;
    if (!e) { setErr('Please enter your email address first.'); return; }
    setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(e, { redirectTo: 'https://app.nexthello.co.uk' });
    if (error) { setErr(error.message); }
    else { setResetSent(true); setErr(''); }
    setLoading(false);
  };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white, overflow:"auto" }}>
      <div style={{ background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, padding:"30px 24px 26px" }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:C.white, fontSize:22, cursor:"pointer", marginBottom:12, padding:0 }}>←</button>
        <div style={{ fontSize:26, fontWeight:700, color:C.white }}>Welcome back</div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.75)", fontFamily:sf, marginTop:4 }}>Sign in to continue your journey</div>
      </div>
      <div style={{ padding:"28px 24px" }}>
        <InputField label="EMAIL ADDRESS" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
        <InputField label="PASSWORD" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Your password"/>
        {err && <p style={{ color:C.coral, fontSize:13, fontFamily:sf, marginBottom:10 }}>{err}</p>}
        {resetSent && <div style={{ background:"#E8F5E9", borderRadius:12, padding:"12px 16px", marginBottom:16 }}><p style={{ color:"#2E7D32", fontSize:13, fontFamily:sf, margin:0 }}>✅ Password reset email sent! Check your inbox.</p></div>}
        <div style={{ textAlign:"right", marginBottom:16 }}>
          <span onClick={sendReset} style={{ fontSize:13, color:C.coral, fontFamily:sf, cursor:"pointer" }}>Forgot password? Tap to reset</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
          <input type="checkbox" id="rememberMe" checked={rememberMe} onChange={e=>setRememberMe(e.target.checked)} style={{ width:18, height:18, accentColor:C.coral, cursor:"pointer" }}/>
          <label htmlFor="rememberMe" style={{ fontSize:13, color:C.muted, fontFamily:sf, cursor:"pointer" }}>Remember me</label>
        </div>
        <Btn onClick={submit} disabled={loading}>{loading ? "Signing in..." : "Sign In"}</Btn>
      </div>
    </div>
  );
}

  const [communityInterests, setCommunityInterests] = useState([]);

}

function RegisterScreen({ onBack, onSuccess }) {
  const [step, setStep] = useState(1); const TOTAL = 6;
  const [d, setD] = useState({ firstName:"", lastName:"", email:"", password:"", dob:"", gender:"", interestedIn:[], ageMin:50, ageMax:75, location:"", bio:"", interests:[], customInterest:"" });
  const [loading, setLoading] = useState(false);
  const communityInterests = useCommunityInterests();
  const [err, setErr] = useState('');
  const set = (k,v) => setD(p=>({...p,[k]:v}));
  const toggleArr = (k,v) => set(k, d[k].includes(v)?d[k].filter(x=>x!==v):[...d[k],v]);
  const progress = (step/TOTAL)*100;
  const titles = ["Your details","About you","Your location","Your story","Your interests","Almost done!"];
  const subs = ["Let's start with the basics","Help us match you better","So we can show nearby members","Write a short bio","Pick at least 3 interests","Create your account"];
  const valid = () => {
    if(step===1) return d.firstName&&d.lastName&&d.email&&d.password.length>=8;
    if(step===2) return d.dob&&d.gender&&d.interestedIn.length>0;
    if(step===3) return d.location;
    if(step===4) return d.bio.length>=20;
    if(step===5) return d.interests.length>=3;
    if(step===6) return true;
    return true;
  };
  const chip = (label, active, onClick) => <button key={label} onClick={onClick} style={{ padding:"8px 14px", borderRadius:22, cursor:"pointer", border:`1.5px solid ${active?C.coral:"#DDD8D4"}`, background:active?C.coralPale:C.white, color:active?C.coral:C.muted, fontSize:12, fontWeight:active?600:400, fontFamily:sf, marginBottom:6 }}>{label}</button>;

  const createAccount = async () => {
    setLoading(true); setErr('');
    const isFoundingMember = new Date() < new Date('2026-06-01');
    try {
      const { data, error } = await auth.signUp(d.email, d.password);
      if (error) { setErr(error.message); setLoading(false); return; }

      const userId = data.user?.id || data.session?.user?.id;

      if (userId) {
        const profileData = {
          id: userId,
          first_name: d.firstName, last_name: d.lastName,
          age: new Date().getFullYear() - new Date(d.dob).getFullYear(),
          gender: d.gender, interested_in: d.interestedIn,
          age_min: d.ageMin, age_max: d.ageMax,
          location: d.location, bio: d.bio, interests: d.interests,
          verified: false,
          founding_member: isFoundingMember,
        };
        const { error: profileError } = await db.saveProfile(profileData);
        if (profileError) {
          localStorage.setItem('nh_pending_profile', JSON.stringify(profileData));
        }

              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:16px;">Welcome to Next Hello — and congratulations on being one of our very first members! 🎉</p>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:16px;">I'm Paul, the founder. Not a faceless corporation with a ping pong table and a juice bar. Just someone who got fed up with expensive, impersonal dating sites and decided to do something about it.</p>
              ${isFoundingMember ? `<div style="background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);border-radius:12px;padding:14px 18px;margin-bottom:16px;"><p style="font-size:14px;color:#FFD700;margin:0;line-height:1.7;">👑 <strong>You're a VIP Founding Member</strong> — Next Hello is completely free for you for a full 12 months. Not bad for a few minutes of your time!</p></div>` : ''}
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">A couple of things to get you started:</strong></p>
              <p style="font-size:14px;color:rgba(255,255,255,0.8);line-height:1.8;margin-bottom:16px;">
                📸 <strong style="color:#fff;">Add a great photo</strong> — smiling ones get the most Hellos. Not your car, not your cat. We have standards. 😄<br/>
                💕 <strong style="color:#fff;">Browse and say Hello</strong> to anyone who catches your eye — and yes, we know for now you may be mostly saying Hello to yourself until we grow. Bear with us, great things take a little time! 😄<br/>
                👋 <strong style="color:#fff;">Not interested?</strong> Just say Goodbye — they'll never know<br/>
                🎉 <strong style="color:#fff;">Check out Events</strong> — meet members in real life
              </p>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:24px;">If you have any questions — send us a message directly through the app. The 'admin team' is currently just me, Paul, in my front room in Macclesfield — but I'm very friendly and I make a great cup of tea. ☕😄</p>
              <a href="https://app.nexthello.co.uk" style="display:inline-block;background:linear-gradient(135deg,#C8614A,#D4775F);color:white;padding:14px 28px;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px;">Go to Next Hello →</a>
              <p style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:28px;line-height:1.75;">Welcome aboard. One Hello really can change everything. 💕<br/><br/><strong style="color:#F0DDD4;">Paul x</strong><br/><span style="font-size:12px;color:rgba(255,255,255,0.45);">Founder, Next Hello</span></p>
            </div>`
        ).catch(e => console.log('Welcome email failed:', e));
        // Admin notification — fire and forget, never block signup
        const signupTime = new Date().toLocaleString('en-GB', { dateStyle:'full', timeStyle:'short' });
        const age = d.dob ? new Date().getFullYear() - new Date(d.dob).getFullYear() : 'not provided';
        window.sendEmail(
          'pbhalfpenny@icloud.com',
          `🎉 New member joined Next Hello`,
          `<div style="font-family:Georgia,serif;max-width:500px;margin:0 auto;padding:28px 24px;background:#1E1C1B;color:#FAFAF8;border-radius:16px;">
              <div style="font-size:11px;letter-spacing:0.2em;color:#C8614A;margin-bottom:4px;">N E X T</div>
              <div style="font-size:28px;font-weight:700;color:#FAFAF8;margin-bottom:20px;">New Member Alert 🎉</div>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Name:</strong> ${d.firstName} ${d.lastName || ''}</p>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Email:</strong> ${d.email}</p>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Age:</strong> ${age}</p>
              <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Signed up:</strong> ${signupTime}</p>
              ${isFoundingMember ? `<p style="font-size:14px;color:#FFD700;margin-top:12px;">👑 VIP Founding Member</p>` : ''}
            </div>`
        ).catch(e => console.log('Admin notification failed:', e));
      } else {
        const profileData = {
          first_name: d.firstName, last_name: d.lastName,
          age: new Date().getFullYear() - new Date(d.dob).getFullYear(),
          gender: d.gender, interested_in: d.interestedIn,
          age_min: d.ageMin, age_max: d.ageMax,
          location: d.location, bio: d.bio, interests: d.interests,
          verified: false,
          founding_member: isFoundingMember,
        };
        localStorage.setItem('nh_pending_profile', JSON.stringify(profileData));
        setErr('✅ Account created! Please check your email to confirm your account, then sign in.');
        setLoading(false);
        setTimeout(() => onSuccess(), 3000);
        return;
      }
      onSuccess();
    } catch(e) { setErr(e.message || 'Something went wrong. Please try again.'); }
    setLoading(false);
  };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white, overflow:"hidden" }}>
      <div style={{ background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, padding:"28px 24px 20px", flexShrink:0 }}>
        <button onClick={()=>step>1?setStep(s=>s-1):onBack()} style={{ background:"none", border:"none", color:C.white, fontSize:22, cursor:"pointer", marginBottom:10, padding:0 }}>←</button>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
          <div style={{ fontSize:20, fontWeight:700, color:C.white }}>{titles[step-1]}</div>
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.7)", fontFamily:sf }}>Step {step} of {TOTAL}</span>
        </div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.75)", fontFamily:sf, marginBottom:12 }}>{subs[step-1]}</div>
        <div style={{ height:4, background:"rgba(255,255,255,0.25)", borderRadius:4 }}>
          <div style={{ height:"100%", width:`${progress}%`, background:C.white, borderRadius:4, transition:"width 0.3s" }}/>
        </div>
      </div>

      <div style={{ flex:1, overflow:"auto", padding:"22px 24px 100px" }}>
        {step===1 && <>
          <InputField label="FIRST NAME" value={d.firstName} onChange={e=>set("firstName",e.target.value)} placeholder="e.g. Margaret"/>
          <InputField label="LAST NAME" value={d.lastName} onChange={e=>set("lastName",e.target.value)} placeholder="e.g. Thompson"/>
          <InputField label="EMAIL ADDRESS" type="email" value={d.email} onChange={e=>set("email",e.target.value)} placeholder="you@example.com"/>
          <InputField label="PASSWORD (min. 8 characters)" type="password" value={d.password} onChange={e=>set("password",e.target.value)} placeholder="Choose a secure password"/>
          <div style={{ background:C.coralPale, borderRadius:12, padding:"10px 14px" }}><p style={{ fontSize:12, color:C.coral, fontFamily:sf, margin:0, lineHeight:1.6 }}>🔒 Next Hello is exclusively for members aged 50+.</p></div>
        </>}

        {step===2 && <>
          <InputField label="DATE OF BIRTH" type="date" value={d.dob} onChange={e=>set("dob",e.target.value)}/>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:8 }}>I AM A</label>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>{["Man","Woman","Non-binary","Prefer not to say"].map(g=>chip(g,d.gender===g,()=>set("gender",g)))}</div>
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:8 }}>INTERESTED IN MEETING</label>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>{["Men","Women","Everyone"].map(g=>chip(g,d.interestedIn.includes(g),()=>toggleArr("interestedIn",g)))}</div>
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:10 }}>SHOW ME PEOPLE AGED</label>
            <div style={{ background:C.coralPale, borderRadius:16, padding:"16px 18px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:16 }}>
                <div style={{ textAlign:"center" }}><div style={{ fontSize:26, fontWeight:700, color:C.coral }}>{d.ageMin}</div><div style={{ fontSize:10, color:C.muted, fontFamily:sf }}>MIN</div></div>
                <div style={{ textAlign:"center" }}><div style={{ fontSize:26, fontWeight:700, color:C.coral }}>{d.ageMax>=85?"85+":d.ageMax}</div><div style={{ fontSize:10, color:C.muted, fontFamily:sf }}>MAX</div></div>
              </div>
              <div style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}><span style={{ fontSize:10, color:C.muted, fontFamily:sf }}>Minimum</span><span style={{ fontSize:10, fontWeight:600, color:C.coral, fontFamily:sf }}>{d.ageMin}</span></div>
                <input type="range" min={50} max={83} value={d.ageMin} onChange={e=>set("ageMin",Math.min(+e.target.value,d.ageMax-2))} style={{ width:"100%", accentColor:C.coral }}/>
              </div>
              <div>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}><span style={{ fontSize:10, color:C.muted, fontFamily:sf }}>Maximum</span><span style={{ fontSize:10, fontWeight:600, color:C.coral, fontFamily:sf }}>{d.ageMax>=85?"85+":d.ageMax}</span></div>
                <input type="range" min={52} max={85} value={d.ageMax} onChange={e=>set("ageMax",Math.max(+e.target.value,d.ageMin+2))} style={{ width:"100%", accentColor:C.coral }}/>
              </div>
            </div>
          </div>
        </>}

        {step===3 && <>
          <InputField label="YOUR TOWN OR CITY" value={d.location} onChange={e=>set("location",e.target.value)} placeholder="e.g. London, UK"/>
          <div style={{ background:C.coralPale, borderRadius:14, padding:"12px 14px" }}><p style={{ fontSize:12, color:C.coral, fontFamily:sf, margin:0, lineHeight:1.6 }}>📍 We use your location to show you members nearby. It's never shared publicly.</p></div>
        </>}

        {step===4 && <>
          <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:6 }}>ABOUT YOU</label>
          <textarea value={d.bio} onChange={e=>set("bio",e.target.value)} rows={6} placeholder="Tell potential matches about yourself — your passions, what you're looking for, what makes you laugh..." style={{ width:"100%", padding:"14px", borderRadius:14, border:"1.5px solid #DDD8D4", outline:"none", resize:"none", fontSize:14, background:C.offWhite, color:C.text, boxSizing:"border-box", fontFamily:sf, lineHeight:1.65 }}/>
          <div style={{ textAlign:"right", fontSize:11, color:d.bio.length<20?C.coral:C.muted, fontFamily:sf, marginTop:4 }}>{d.bio.length} chars {d.bio.length<20?"(min. 20)":""}</div>
        </>}

        {step===5 && <>
          <p style={{ fontSize:13, color:C.muted, fontFamily:sf, marginBottom:4 }}>Select as many as you like!</p>
          <p style={{ fontSize:12, color:C.coral, fontFamily:sf, marginBottom:14 }}>{d.interests.length} selected</p>
          {INTERESTS_GROUPED.map(group=>(
            <div key={group.category} style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.coral, letterSpacing:"0.1em", fontFamily:sf, marginBottom:8 }}>{group.category.toUpperCase()}</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{group.items.map(t=>chip(t,d.interests.includes(t),()=>toggleArr("interests",t)))}</div>
            </div>
          ))}
          {/* Community-submitted interests */}
          {communityInterests.filter(ci => !INTERESTS_GROUPED.flatMap(g=>g.items).includes(ci)).length > 0 && (
            <div style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.coral, letterSpacing:"0.1em", fontFamily:sf, marginBottom:8 }}>✨ ADDED BY MEMBERS</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {communityInterests.filter(ci => !INTERESTS_GROUPED.flatMap(g=>g.items).includes(ci)).map(t=>chip(t,d.interests.includes(t),()=>toggleArr("interests",t)))}
              </div>
            </div>
          )}
          <div style={{ background:C.offWhite, borderRadius:14, padding:"12px 14px" }}>
            <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:8 }}>ADD YOUR OWN</div>
            <div style={{ display:"flex", gap:8 }}>
              <input
                id="custom-interest-input"
                value={d.customInterest}
                onChange={e=>set("customInterest",e.target.value)}
                onKeyDown={e=>{
                  if(e.key==="Enter" && e.target.value.trim()) {
                    const t = e.target.value.trim();
                    setD(prev => ({
                      ...prev,
                      interests: prev.interests.includes(t) ? prev.interests : [...prev.interests, t],
                      customInterest: ""
                    }));
                    db.submitCustomInterest(t, null);
                  }
                }}
                placeholder="e.g. Beekeeping..." style={{ flex:1, padding:"10px 14px", borderRadius:22, border:"1.5px solid #DDD8D4", outline:"none", fontSize:13, background:C.white, fontFamily:sf }}/>
              <button onClick={()=>{
                const input = document.getElementById('custom-interest-input');
                const t = input ? input.value.trim() : d.customInterest.trim();
                if(t) {
                  setD(prev => ({
                    ...prev,
                    interests: prev.interests.includes(t) ? prev.interests : [...prev.interests, t],
                    customInterest: ""
                  }));
                  db.submitCustomInterest(t, null);
                }
              }} style={{ padding:"10px 16px", borderRadius:22, background:C.coral, border:"none", color:C.white, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:sf }}>Add</button>
            </div>
            <p style={{ fontSize:11, color:C.muted, fontFamily:sf, marginTop:8, lineHeight:1.5 }}>✨ Your custom interests are shared with the community so others can discover them too!</p>
          </div>
        </>}

        {step===6 && <>
          <div style={{ background:C.offWhite, borderRadius:16, padding:16, marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:10 }}>YOUR PROFILE SUMMARY</div>
            {[["Name",`${d.firstName} ${d.lastName}`],["Email",d.email],["Gender",d.gender||"—"],["Interested in",d.interestedIn.join(", ")||"—"],["Location",d.location||"—"],["Age range",`${d.ageMin} – ${d.ageMax>=85?"85+":d.ageMax}`],["Interests",d.interests.slice(0,3).join(", ")+(d.interests.length>3?` +${d.interests.length-3} more`:"")||"—"]].map(([k,v])=>(
              <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:"1px solid #E8E4E0" }}>
                <span style={{ fontSize:12, color:C.muted, fontFamily:sf }}>{k}</span>
                <span style={{ fontSize:12, fontWeight:600, color:C.text, fontFamily:sf, maxWidth:"55%", textAlign:"right" }}>{v}</span>
              </div>
            ))}
          </div>
          {err && <p style={{ color:C.coral, fontSize:13, fontFamily:sf, marginBottom:10 }}>{err}</p>}
          <div style={{ background:C.coralPale, borderRadius:14, padding:"10px 14px", marginBottom:14 }}><p style={{ fontSize:12, color:C.coral, fontFamily:sf, margin:0, lineHeight:1.6 }}>🔒 By creating your account you agree to our Terms of Service. You confirm you are aged 50 or over.</p></div>
        </>}
      </div>

      <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"12px 24px 28px", background:C.white, borderTop:"1px solid #EAE6E2" }}>
        <Btn onClick={step<TOTAL?()=>setStep(s=>s+1):createAccount} disabled={!valid()||loading}>
          {loading?"Creating your profile...":(step===TOTAL?"Create My Profile →":"Continue →")}
        </Btn>
      </div>
    </div>
  );
}

// ── Report & Block Modal ──────────────────────────────────
function ReportBlockModal({ profile, currentUser, onClose, onBlocked }) {
  const [view, setView] = useState('menu'); // menu | report | blocked | reported
  const [reason, setReason] = useState('');
  const [details, setDetails] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const REASONS = [
    'Fake or misleading profile',
    'Abusive or offensive messages',
    'Suspected romance scammer',
    'Inappropriate photos',
    'Harassment or unwanted contact',
    'Made me feel unsafe',
    'Other',
  ];

  const handleBlock = async () => {
    setSubmitting(true);
    try {
      await sb.from('blocked_members').upsert({
        blocker_id: currentUser.id,
        blocked_id: profile.id,
      });
      setView('blocked');
      onBlocked && onBlocked(profile.id);
    } catch(e) { alert('Could not block. Please try again.'); }
    setSubmitting(false);
  };

  const handleReport = async () => {
    if (!reason) { alert('Please select a reason.'); return; }
    setSubmitting(true);
    try {
      await sb.from('reports').insert({
        reporter_id: currentUser.id,
        reported_id: profile.id,
        reason,
        details,
        status: 'pending',
      });
      setView('reported');
    } catch(e) { alert('Could not submit report. Please try again.'); }
    setSubmitting(false);
  };

  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.8)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:999 }}>
      <div style={{ background:C.white, borderRadius:'22px 22px 0 0', width:'100%', maxWidth:390, padding:'20px 22px 40px', fontFamily:sf }}>
        <div style={{ width:40, height:4, background:'#DDD', borderRadius:2, margin:'0 auto 20px' }}/>

        {view === 'menu' && <>
          <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:4 }}>
            {profile.first_name}'s Profile
          </div>
          <div style={{ fontSize:13, color:C.muted, marginBottom:20 }}>What would you like to do?</div>
          <button onClick={()=>setView('report')} style={{ width:'100%', padding:'14px', borderRadius:14, background:'#FFF3E0', border:'1.5px solid #FFB74D', color:'#E65100', fontSize:14, fontWeight:700, cursor:'pointer', marginBottom:10, display:'flex', alignItems:'center', gap:10 }}>
            <span style={{fontSize:20}}>🚩</span> Report {profile.first_name}
          </button>
          <button onClick={handleBlock} disabled={submitting} style={{ width:'100%', padding:'14px', borderRadius:14, background:'#FFEBEE', border:'1.5px solid #EF9A9A', color:'#C62828', fontSize:14, fontWeight:700, cursor:'pointer', marginBottom:10, display:'flex', alignItems:'center', gap:10 }}>
            <span style={{fontSize:20}}>🚫</span> Block {profile.first_name}
          </button>
          <button onClick={onClose} style={{ width:'100%', padding:'12px', borderRadius:14, background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer' }}>Cancel</button>
        </>}

        {view === 'report' && <>
          <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:4 }}>Report {profile.first_name}</div>
          <div style={{ fontSize:13, color:C.muted, marginBottom:16 }}>Your report goes directly to the Next Hello founder. All reports are confidential.</div>
          <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:'0.08em', marginBottom:8 }}>REASON *</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:14 }}>
            {REASONS.map(r => (
              <button key={r} onClick={()=>setReason(r)} style={{ padding:'10px 14px', borderRadius:12, border:`1.5px solid ${reason===r?C.coral:'#DDD8D4'}`, background:reason===r?C.coralPale:C.white, color:reason===r?C.coral:C.text, fontSize:13, fontWeight:reason===r?700:400, cursor:'pointer', textAlign:'left' }}>
                {reason===r?'✓ ':''}{r}
              </button>
            ))}
          </div>
          <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:'0.08em', marginBottom:6 }}>ADDITIONAL DETAILS (optional)</div>
          <textarea value={details} onChange={e=>setDetails(e.target.value)} rows={3} placeholder="Tell us more about what happened..." style={{ width:'100%', padding:'10px 14px', borderRadius:12, border:'1.5px solid #DDD8D4', outline:'none', resize:'none', fontSize:13, background:C.offWhite, marginBottom:14, boxSizing:'border-box', fontFamily:sf }}/>
          <button onClick={handleReport} disabled={!reason||submitting} style={{ width:'100%', padding:'14px', borderRadius:14, background:!reason?'#EEE':`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:'none', color:!reason?C.muted:C.white, fontSize:14, fontWeight:700, cursor:!reason?'not-allowed':'pointer', marginBottom:8 }}>
            {submitting?'Submitting...':'Submit Report'}
          </button>
          <button onClick={()=>setView('menu')} style={{ width:'100%', padding:'10px', borderRadius:14, background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer' }}>Back</button>
        </>}

        {view === 'blocked' && <>
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🚫</div>
            <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:8 }}>{profile.first_name} has been blocked</div>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:20 }}>{profile.first_name} can no longer see your profile, send you Hellos, or message you. They will never be told you blocked them.</p>
            <button onClick={onClose} style={{ width:'100%', padding:'14px', borderRadius:14, background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:'none', color:C.white, fontSize:14, fontWeight:700, cursor:'pointer' }}>Done</button>
          </div>
        </>}

        {view === 'reported' && <>
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🙏</div>
            <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:8 }}>Report received</div>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:20 }}>Thank you for keeping Next Hello safe. Your report has been sent directly to our founder and will be reviewed within 24 hours. Your identity is completely confidential.</p>
            <button onClick={onClose} style={{ width:'100%', padding:'14px', borderRadius:14, background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:'none', color:C.white, fontSize:14, fontWeight:700, cursor:'pointer' }}>Done</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── Browse Screen ─────────────────────────────────────────
const FOUNDER_EMAIL = 'pbhalfpenny@icloud.com';
const isGodMode = (user) => user?.email === FOUNDER_EMAIL;

function BrowseScreen({ currentUser, prefs, onSendHello }) {
  const [profiles, setProfiles] = useState([]);
  const [idx, setIdx] = useState(0);
  const [showDetail, setShowDetail] = useState(false);
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);
  const [favourites, setFavourites] = useState([]);
  const [founderMode, setFounderMode] = useState(true);
  const [showReportBlock, setShowReportBlock] = useState(false);
  const [blockedIds, setBlockedIds] = useState([]);
  const [zoomPhoto, setZoomPhoto] = useState(null);
  const isFounder = isGodMode(currentUser);

  const [goodbyeIds, setGoodbyeIds] = useState([]);
  const [maybeIds, setMaybeIds] = useState([]);

  useEffect(() => {
    if (currentUser?.id) loadExclusions();
  }, [currentUser]);

  const loadExclusions = async () => {
    const [goodbyeRes, maybeRes] = await Promise.all([
      sb.from('goodbyes').select('to_user').eq('from_user', currentUser.id),
      sb.from('maybes').select('to_user').eq('from_user', currentUser.id),
    ]);
    const gIds = goodbyeRes.data ? goodbyeRes.data.map(g => g.to_user) : [];
    const mIds = maybeRes.data ? maybeRes.data.map(m => m.to_user) : [];
    setGoodbyeIds(gIds);
    setMaybeIds(mIds);
    // Pass ids directly — avoids race condition with state update
    loadProfiles(gIds, mIds);
  };

  useEffect(() => { loadProfiles(); }, [founderMode]);

  const loadProfiles = async (gIds = goodbyeIds, mIds = maybeIds) => {
    setLoading(true);
    const { data } = await db.getProfiles();
    if (data) {
      let filtered = data.filter(p => p.id !== currentUser?.id && !blockedIds.includes(p.id) && !gIds.includes(p.id) && !mIds.includes(p.id));
      // God Mode: founder sees ALL profiles unfiltered
      if (!isFounder || !founderMode) {
        const myGender = (prefs?.gender || '').toLowerCase();
        const interestedIn = prefs?.interestedIn || ['Everyone'];
        const wantsEveryone = interestedIn.includes('Everyone') || interestedIn.length === 0;
        if (!wantsEveryone) {
          filtered = filtered.filter(p => {
            const g = (p.gender || '').toLowerCase();
            if (interestedIn.includes('Women') && (g === 'woman' || g === 'female')) return true;
            if (interestedIn.includes('Men') && (g === 'man' || g === 'male')) return true;
            if (interestedIn.includes('Everyone')) return true;
            return false;
          });
        }
        // Also filter by who THEY are interested in
        filtered = filtered.filter(p => {
          const theirInterest = p.interested_in || ['Everyone'];
          if (theirInterest.includes('Everyone')) return true;
          if (theirInterest.includes('Men') && (myGender === 'man' || myGender === 'male')) return true;
          if (theirInterest.includes('Women') && (myGender === 'woman' || myGender === 'female')) return true;
          return false;
        });
        // Filter out paused/deactivated profiles
        filtered = filtered.filter(p => !p.status || p.status === 'active' || p.status === null);
        if (prefs?.ageMin) filtered = filtered.filter(p => !p.age || p.age >= prefs.ageMin);
        if (prefs?.ageMax && prefs.ageMax < 85) filtered = filtered.filter(p => !p.age || p.age <= prefs.ageMax);
      }
      setProfiles(filtered);
    }
    setLoading(false);
  };

  const profile = profiles[idx] || null;
  const myInterests = prefs?.interests || [];
  const sharedTags = profile ? (profile.interests || []).filter(t => myInterests.includes(t)) : [];

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2200); };

  const sendHello = async () => {
    if (!profile || !currentUser) return;
    const { error: helloError } = await db.sendHello(currentUser.id, profile.id);
    if (helloError) {
      console.error('sendHello FAILED:', helloError.message, helloError.code, helloError.details);
      showToast(`Hello failed — please try again`);
      return;
    }
    console.log('sendHello SUCCESS — from:', currentUser.id, 'to:', profile.id);
    if (!favourites.includes(profile.id)) setFavourites(f => [...f, profile.id]);
    onSendHello && onSendHello(profile);
    // Send email notification to the person receiving the Hello
    try {
      const { data: myProfile } = await db.getProfile(currentUser.id);
      if (profile.email && myProfile) {
        await window.notifyHello(profile.email, profile.first_name, myProfile.first_name);
      }
    } catch(e) { console.log('Hello notification failed:', e); }
    showToast(`Hello sent to ${profile.first_name}! 💕`);
    setTimeout(() => setIdx(i => i+1), 500);
  };

  const sayGoodbye = async () => {
    if (profile && currentUser) {
      const newGoodbyes = [...goodbyeIds, profile.id];
      setGoodbyeIds(newGoodbyes);
      try {
        await sb.from('goodbyes').upsert({ from_user: currentUser.id, to_user: profile.id });
      } catch(e) { console.log('Goodbye save failed:', e); }
    }
    showToast(`Goodbye 👋`);
    setIdx(i => i+1);
  };
  const sayMaybe = async () => {
    if (profile && currentUser) {
      const newMaybes = [...maybeIds, profile.id];
      setMaybeIds(newMaybes);
      try {
        await sb.from('maybes').upsert({ from_user: currentUser.id, to_user: profile.id });
      } catch(e) { console.log('Maybe save failed:', e); }
    }
    showToast(`Saved for later 🤔`);
    setIdx(i => i+1);
  };
  const goBack = () => { if (idx > 0) { setIdx(i => i-1); showToast("Going back ←"); } };

  const deleteProfile = async (p) => {
    if (!window.confirm(`Delete ${p.first_name}'s profile? This cannot be undone.`)) return;
    await sb.from('profiles').delete().eq('id', p.id);
    await loadProfiles();
    showToast(`${p.first_name}'s profile deleted`);
  };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.dark, overflow:"hidden" }}>
      {/* Header */}
      <div style={{ padding:"8px 20px 10px", borderBottom:`1px solid ${C.darkBorder}` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <NHLogo size={36}/>
            <div>
              <div style={{ fontSize:10, letterSpacing:"0.2em", color:C.coral, fontWeight:600 }}>N E X T</div>
              <div style={{ fontSize:20, fontWeight:700, color:C.white, lineHeight:1 }}>Hello</div>
            </div>
          </div>
          {isFounder && (
            <button onClick={()=>setFounderMode(f=>!f)} style={{ background:founderMode?"rgba(255,215,0,0.25)":"rgba(255,255,255,0.08)", border:`1.5px solid ${founderMode?"#FFD700":"rgba(255,255,255,0.2)"}`, borderRadius:20, padding:"5px 12px", color:founderMode?"#FFD700":"rgba(255,255,255,0.5)", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>
              {founderMode ? "⚡ GOD MODE" : "⚡ God Mode OFF"}
            </button>
          )}
        </div>
        <div style={{ marginTop:3, fontSize:9, letterSpacing:"0.15em", color:C.coralLight }}>BECAUSE ONE HELLO CAN CHANGE EVERYTHING</div>
        {founderMode && isFounder && <div style={{ marginTop:4, fontSize:10, color:"#FFD700", fontFamily:sf }}>⚡ God Mode — all members visible · delete enabled</div>}
      </div>

      <div style={{ flex:1, padding:"10px 16px", display:"flex", flexDirection:"column", gap:8 }}>
        {loading ? (
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div style={{ fontSize:13, color:C.muted, fontFamily:sf }}>Finding members near you...</div>
          </div>
        ) : profile ? <>
          <div style={{ flex:1, borderRadius:24, overflow:"hidden", position:"relative", boxShadow:"0 8px 32px rgba(0,0,0,0.5)", cursor:"pointer" }} onClick={()=>setShowDetail(true)}>
            {(profile.photos && profile.photos[0]) || profile.photo_url ? (
              <img src={(profile.photos && profile.photos[0]) || profile.photo_url} alt={profile.first_name} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
            ) : (
              <div style={{ width:"100%", height:"100%", background:`linear-gradient(135deg,${C.darkCard},${C.dark})`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ fontSize:80, opacity:0.3 }}>👤</div>
              </div>
            )}
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 55%, transparent 100%)" }}/>
            <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"16px 18px" }}>
              <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:2 }}>
                <span style={{ fontSize:24, fontWeight:700, color:C.white }}>{profile.first_name}</span>
                <span style={{ fontSize:18, color:"rgba(255,255,255,0.8)" }}>{profile.age}</span>
                {profile.verified && <div style={{ background:C.coral, borderRadius:"50%", width:18, height:18, display:"flex", alignItems:"center", justifyContent:"center" }}><span style={{ color:"#fff", fontSize:10, fontWeight:700 }}>✓</span></div>}
                {profile.founding_member && <div style={{ background:"linear-gradient(135deg,#FFD700,#FFA500)", borderRadius:20, padding:"2px 8px", fontSize:9, color:"#5D3A00", fontWeight:700, fontFamily:sf }}>👑 VIP</div>}
              </div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.65)", marginBottom:8, fontFamily:sf }}>📍 {profile.location}</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {(profile.interests||[]).slice(0,3).map(tag => {
                  const shared = myInterests.includes(tag);
                  return <span key={tag} style={{ background:shared?"rgba(200,97,74,0.6)":"rgba(200,97,74,0.25)", border:`1px solid ${shared?"rgba(255,255,255,0.6)":"rgba(200,97,74,0.4)"}`, borderRadius:20, padding:"3px 10px", fontSize:11, color:C.white, fontFamily:sf, fontWeight:shared?700:400 }}>{shared?"⭐ ":""}{tag}</span>;
                })}
              </div>
              {founderMode && (
                <button onClick={e=>{e.stopPropagation();deleteProfile(profile);}} style={{ marginTop:8, background:"rgba(255,50,50,0.7)", border:"none", borderRadius:20, padding:"4px 12px", color:"white", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>🗑 Delete profile</button>
              )}
            </div>
            {/* Back button */}
            {idx > 0 && (
              <button onClick={e=>{e.stopPropagation();goBack();}} style={{ position:"absolute", top:14, left:14, background:"rgba(0,0,0,0.5)", border:"none", borderRadius:"50%", width:36, height:36, color:C.white, fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>
            )}
            <div style={{ position:"absolute", top:14, right:14, background:"rgba(0,0,0,0.4)", borderRadius:20, padding:"4px 10px" }}><span style={{ fontSize:10, color:"rgba(255,255,255,0.7)", fontFamily:sf }}>Tap for more</span></div>
          </div>

          {/* Hello / Maybe / Goodbye buttons */}
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={favourites.includes(profile?.id) ? null : sendHello} style={{ flex:1, padding:"14px", borderRadius:16, background:favourites.includes(profile?.id)?`linear-gradient(135deg,#4CAF50,#388E3C)`:`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:"none", color:C.white, fontSize:13, fontWeight:700, cursor:favourites.includes(profile?.id)?"default":"pointer", fontFamily:sf, display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
              <span>{favourites.includes(profile?.id) ? "✅" : "💕"}</span> {favourites.includes(profile?.id) ? "Sent!" : "Hello"}
            </button>
            <button onClick={sayMaybe} style={{ flex:1, padding:"14px", borderRadius:16, background:"rgba(255,193,7,0.15)", border:"1px solid rgba(255,193,7,0.4)", color:"#FFC107", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:sf, display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
              <span>🤔</span> Maybe
            </button>
            <button onClick={sayGoodbye} style={{ flex:1, padding:"14px", borderRadius:16, background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.muted, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:sf, display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
              <span>👋</span> Goodbye
            </button>
          </div>
        </> : (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12 }}>
            <div style={{ fontSize:36 }}>✨</div>
            <div style={{ fontSize:18, color:C.white, fontWeight:600, textAlign:"center" }}>
              {profiles.length === 0 ? "Be the first member!" : "You've seen everyone!"}
            </div>
            <div style={{ fontSize:13, color:C.muted, fontFamily:sf, textAlign:"center", lineHeight:1.6 }}>
              {profiles.length === 0 ? "Invite friends to join Next Hello." : "Check back soon for new members."}
            </div>
            <button onClick={loadProfiles} style={{ marginTop:8, padding:"10px 24px", borderRadius:20, background:C.coral, border:"none", color:C.white, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:sf }}>Refresh</button>
          </div>
        )}
      </div>

      {/* Detail modal */}
      {showDetail && profile && (
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", flexDirection:"column", zIndex:10 }}>
          <div style={{ flex:1, overflow:"auto", padding:"20px 20px 110px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <button onClick={()=>setShowDetail(false)} style={{ background:C.darkCard, border:"none", borderRadius:"50%", width:36, height:36, color:C.white, fontSize:18, cursor:"pointer" }}>✕</button>
              <button onClick={()=>setShowReportBlock(true)} style={{ background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:20, padding:"6px 14px", color:"rgba(255,255,255,0.6)", fontSize:12, cursor:"pointer", fontFamily:sf }}>🚩 Report / Block</button>
            </div>
            {profile.photo_url && (
              <div style={{ marginBottom:16 }}>
                <img src={(profile.photos && profile.photos[0]) || profile.photo_url} alt={profile.first_name} onClick={()=>setZoomPhoto((profile.photos && profile.photos[0]) || profile.photo_url)} style={{ width:"100%", borderRadius:20, objectFit:"cover", maxHeight:280, cursor:"zoom-in" }}/>
                {profile.photos && profile.photos.length > 1 && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginTop:6 }}>
                    {profile.photos.slice(1).map((p,i) => (
                      <img key={i} src={p} onClick={()=>setZoomPhoto(p)} style={{ width:"100%", aspectRatio:"1", objectFit:"cover", borderRadius:12, cursor:"zoom-in" }} alt=""/>
                    ))}
                  </div>
                )}
              </div>
            )}
            <div style={{ marginTop:16 }}>
              <div style={{ fontSize:26, fontWeight:700, color:C.white }}>{profile.first_name}, {profile.age}</div>
              <div style={{ fontSize:13, color:C.muted, marginBottom:12, fontFamily:sf }}>📍 {profile.location}</div>
              <p style={{ fontSize:14, color:"rgba(255,255,255,0.8)", lineHeight:1.7, fontFamily:sf, whiteSpace:"pre-wrap" }}>{profile.bio}</p>
              {sharedTags.length > 0 && (
                <div style={{ background:"rgba(200,97,74,0.15)", border:"1px solid rgba(200,97,74,0.3)", borderRadius:12, padding:"8px 12px", margin:"12px 0", display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontSize:14 }}>⭐</span>
                  <span style={{ fontSize:12, color:C.coralLight, fontFamily:sf, fontWeight:600 }}>You both love: {sharedTags.join(", ")}</span>
                </div>
              )}
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:14 }}>
                {(profile.interests||[]).map(tag => {
                  const shared = myInterests.includes(tag);
                  return <span key={tag} style={{ background:shared?C.coral:C.coralPale, borderRadius:20, padding:"5px 14px", fontSize:12, color:shared?C.white:C.coral, fontWeight:600, fontFamily:sf }}>{shared?"⭐ ":""}{tag}</span>;
                })}
              </div>
            </div>
          </div>
          <div style={{ padding:"12px 20px 20px", position:"absolute", bottom:0, left:0, right:0, display:"flex", gap:10 }}>
            <button onClick={()=>{ setShowDetail(false); sayGoodbye(); }} style={{ flex:1, padding:"14px", borderRadius:18, background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.muted, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:sf }}>👋 Goodbye</button>
            <button onClick={()=>{ setShowDetail(false); sendHello(); }} style={{ flex:2, padding:"16px", borderRadius:18, background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:"none", color:C.white, fontSize:16, fontWeight:700, cursor:"pointer", fontFamily:sf }}>💕 Hello to {profile.first_name}</button>
          </div>
        </div>
      )}

      {showReportBlock && profile && (
        <ReportBlockModal
          profile={profile}
          currentUser={currentUser}
          onClose={()=>setShowReportBlock(false)}
          onBlocked={(id)=>{
            setBlockedIds(b=>[...b,id]);
            setShowReportBlock(false);
            setShowDetail(false);
            setIdx(i=>i+1);
          }}
        />
      )}

      {toast && <div style={{ position:"absolute", bottom:90, left:"50%", transform:"translateX(-50%)", background:C.coral, color:C.white, padding:"10px 20px", borderRadius:30, fontSize:13, fontWeight:600, whiteSpace:"nowrap", zIndex:20, fontFamily:sf }}>{toast}</div>}
      {zoomPhoto && (
        <div onClick={()=>setZoomPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, cursor:"zoom-out" }}>
          <button onClick={()=>setZoomPhoto(null)} style={{ position:"absolute", top:16, right:16, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:36, height:36, color:"white", fontSize:18, cursor:"pointer" }}>✕</button>
          <img src={zoomPhoto} style={{ maxWidth:"95vw", maxHeight:"90vh", borderRadius:16, objectFit:"contain" }} alt=""/>
        </div>
      )}
    </div>
  );
}

// ── Hellos / Messages Screen ──────────────────────────────
function HellosScreen({ currentUser }) {
  const [hellos, setHellos] = useState([]);
  const [mutualHellos, setMutualHellos] = useState([]);
  const [active, setActive] = useState(null);
  const [isMutual, setIsMutual] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(true);
  const [aiLoading, setAiLoading] = useState(false);
  const [icebreakers, setIcebreakers] = useState([]);
  const [showIce, setShowIce] = useState(false);
  const [tab, setTab] = useState('received'); // received | matches | maybe
  const [maybeProfiles, setMaybeProfiles] = useState([]);
  const [selectedMaybeProfile, setSelectedMaybeProfile] = useState(null);
  const [zoomPhoto, setZoomPhoto] = useState(null);
  const bottomRef = useRef(null);

  useEffect(() => { 
    if (currentUser?.id) {
      loadHellos();
      loadMaybes();
    }
  }, [currentUser?.id]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages.length]);

  const loadMaybes = async () => {
    const { data } = await sb.from('maybes').select('to_user').eq('from_user', currentUser.id);
    if (!data || data.length === 0) return;
    const ids = data.map(m => m.to_user);
    const { data: profiles } = await sb.from('profiles').select('*').in('id', ids);
    if (profiles) setMaybeProfiles(profiles);
  };

  const loadHellos = async () => {
    if (!currentUser?.id) return;
    // Validate UUID format before sending to Supabase
    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    if (!uuidRegex.test(currentUser.id)) {
      console.error('loadHellos: invalid user ID format:', currentUser.id);
      return;
    }
    setLoading(true);
    try {
      console.log('Loading hellos for user ID:', currentUser?.id);
      // Get hellos received
      const { data: received, error: recError } = await db.getHellosReceived(currentUser?.id);
      console.log('Received hellos:', received, 'Error:', recError);
      // Get hellos sent
      const { data: sent, error: sentError } = await db.getHellosSent(currentUser?.id);
      console.log('Sent hellos:', sent, 'Error:', sentError);
      const sentIds = (sent || []).map(h => h.to_user);

      if (received) {
        setHellos(received);
        // Find mutual matches — they sent to me AND I sent to them
        const mutual = received.filter(h => sentIds.includes(h.from_user));
        setMutualHellos(mutual);
      }
    } catch(e) { console.error('loadHellos error:', e); }
    setLoading(false);
  };

  const openConvo = async (hello, mutual) => {
    setActive(hello);
    setIsMutual(mutual);
    if (mutual) {
      const otherId = hello.from_user;
      const { data } = await db.getMessages(currentUser.id, otherId);
      if (data) setMessages(data);
    }
  };

  const send = async () => {
    if (!input.trim() || !active || !currentUser || !isMutual) return;
    const otherId = active.from_user;
    const msg = { sender_id: currentUser.id, recipient_id: otherId, text: input, read: false };
    await db.sendMessage(msg);
    setMessages(prev => [...prev, { ...msg, created_at: new Date().toISOString() }]);
    // Send email notification
    try {
      const { data: myProfile } = await db.getProfile(currentUser.id);
      if (active.sender?.email && myProfile) {
        await window.notifyMessage(active.sender.email, active.sender.first_name, myProfile.first_name);
      }
    } catch(e) { console.log('Message notification failed:', e); }
    setInput(''); setShowIce(false);
  };

  const getIcebreakers = async () => {
    const p = active?.sender;
    if (!p) return;
    setAiLoading(true); setShowIce(true); setIcebreakers([]);
    try {
      const res = await fetch("https://gmjipbdvcbmrkqaktguw.supabase.co/functions/v1/claude-proxy", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400,
          system:"Warm dating coach for 50+. Return ONLY a JSON array of 3 icebreaker strings, no markdown.",
          messages:[{ role:"user", content:`3 icebreakers for ${p.first_name} (${p.age}), bio: "${p.bio}", interests: ${(p.interests||[]).join(", ")}. Under 30 words each.` }]
        })
      });
      const data = await res.json();
      setIcebreakers(JSON.parse(data.content[0].text.trim().replace(/```json|```/g,"")));
    } catch {
      setIcebreakers(["Your profile genuinely caught my eye!","I'd love to hear more about your adventures.","We seem to share some wonderful interests!"]);
    }
    setAiLoading(false);
  };

  const getProfilePhoto = (hello) => hello?.sender?.photo_url || (hello?.sender?.photos && hello?.sender?.photos[0]) || null;
  const getProfileName = (hello) => hello?.sender?.first_name || "Member";

  if (active) return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white }}>
      <div style={{ padding:"10px 16px", borderBottom:"1px solid #EAE6E2", display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={()=>{ setActive(null); setShowIce(false); }} style={{ background:"none", border:"none", cursor:"pointer", color:C.coral, fontSize:20 }}>←</button>
        {getProfilePhoto(active) ? (
          <img src={getProfilePhoto(active)} style={{ width:38, height:38, borderRadius:"50%", objectFit:"cover" }} alt=""/>
        ) : (
          <div style={{ width:38, height:38, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>👤</div>
        )}
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{getProfileName(active)}</div>
          <div style={{ fontSize:11, color:isMutual?C.coral:C.muted, fontFamily:sf }}>
            {isMutual ? "💕 Mutual Hello — you can chat!" : active.sender?.location || ""}
          </div>
        </div>
        {isMutual && <button onClick={getIcebreakers} style={{ background:C.coralPale, border:"none", borderRadius:20, padding:"6px 12px", color:C.coral, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:sf }}>✨ Icebreakers</button>}
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:8 }}>
        {isMutual ? (
          <>
            <div style={{ textAlign:"center", padding:"12px", background:"#E8F5E9", borderRadius:12, marginBottom:4 }}>
              <p style={{ fontSize:12, color:"#2E7D32", fontFamily:sf, margin:0 }}>💕 You both said Hello! Start the conversation.</p>
            </div>
            {messages.map((m,i) => (
              <div key={i} style={{ display:"flex", justifyContent:m.sender_id===currentUser?.id?"flex-end":"flex-start" }}>
                <div style={{ maxWidth:"72%", padding:"10px 14px", borderRadius:m.sender_id===currentUser?.id?"18px 18px 4px 18px":"18px 18px 18px 4px", background:m.sender_id===currentUser?.id?`linear-gradient(135deg,${C.coral},${C.coralMid})`:C.offWhite, color:m.sender_id===currentUser?.id?C.white:C.text, fontSize:14, lineHeight:1.5, fontFamily:sf }}>{m.text}</div>
              </div>
            ))}
          </>
        ) : (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12, padding:20 }}>
            <div style={{ fontSize:48 }}>👋</div>
            <div style={{ fontSize:16, fontWeight:700, color:C.text, textAlign:"center" }}>{getProfileName(active)} said Hello!</div>
            <p style={{ fontSize:13, color:C.muted, fontFamily:sf, textAlign:"center", lineHeight:1.7 }}>Browse their profile and say Hello back to unlock the conversation. Or simply say Goodbye — they'll never know.</p>
            <div style={{ background:C.coralPale, borderRadius:14, padding:"12px 16px", width:"100%" }}>
              <p style={{ fontSize:12, color:C.coral, fontFamily:sf, margin:0, textAlign:"center", lineHeight:1.6 }}>💕 Chat only opens when you both say Hello</p>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {isMutual && showIce && (
        <div style={{ padding:"8px 14px", background:C.coralPale, borderTop:"1px solid rgba(200,97,74,0.15)" }}>
          <div style={{ fontSize:11, color:C.coral, fontWeight:600, marginBottom:6, fontFamily:sf }}>✨ Tap to use</div>
          {aiLoading ? <div style={{ fontSize:12, color:C.muted, fontFamily:sf }}>Generating...</div>
            : icebreakers.map((ice,i) => <div key={i} onClick={()=>setInput(ice)} style={{ background:C.white, borderRadius:12, padding:"8px 12px", marginBottom:6, fontSize:13, color:C.text, cursor:"pointer", fontFamily:sf }}>{ice}</div>)
          }
        </div>
      )}
      {isMutual && (
        <div style={{ padding:"10px 14px 20px", borderTop:"1px solid #EAE6E2", display:"flex", gap:8 }}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Say something..." style={{ flex:1, padding:"11px 16px", borderRadius:24, border:"1.5px solid #DDD8D4", outline:"none", fontSize:14, background:C.offWhite, color:C.text, fontFamily:sf }}/>
          <button onClick={send} style={{ width:42, height:42, borderRadius:"50%", background:C.coral, border:"none", color:C.white, fontSize:16, cursor:"pointer" }}>→</button>
        </div>
      )}
    </div>
  );

  const displayHellos = tab === 'matches' ? mutualHellos : hellos;

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white }}>
      <div style={{ padding:"16px 20px 12px", borderBottom:"1px solid #EAE6E2" }}>
        <div style={{ fontSize:24, fontWeight:700, color:C.coral }}>Hellos</div>
        {/* Tabs */}
        <div style={{ display:"flex", gap:8, marginTop:10, overflowX:"auto", scrollbarWidth:"none" }}>
          {[['received','👋 Received'],['matches','💕 Matches'],['maybe','🤔 Maybe']].map(([id,label]) => (
            <button key={id} onClick={()=>setTab(id)} style={{ padding:"6px 14px", borderRadius:20, border:`1.5px solid ${tab===id?C.coral:"#DDD8D4"}`, background:tab===id?C.coralPale:C.white, color:tab===id?C.coral:C.muted, fontSize:12, fontWeight:tab===id?700:400, cursor:"pointer", fontFamily:sf, flexShrink:0 }}>
              {label} {id==='matches' && mutualHellos.length > 0 ? `(${mutualHellos.length})` : id==='received' && hellos.length > 0 ? `(${hellos.length})` : id==='maybe' && maybeProfiles.length > 0 ? `(${maybeProfiles.length})` : ''}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex:1, overflow:"auto" }}>
        {loading ? (
          <div style={{ padding:40, textAlign:"center", color:C.muted, fontFamily:sf }}>Loading...</div>
        ) : tab === 'maybe' ? (
          maybeProfiles.length === 0 ? (
            <div style={{ padding:40, textAlign:"center", color:C.muted, fontSize:14, fontFamily:sf, lineHeight:1.7 }}>🤔 No Maybe profiles yet.<br/>Tap Maybe when browsing to save profiles for later.</div>
          ) : (
            <div>
              <div style={{ padding:"10px 18px", fontSize:12, color:C.muted, fontFamily:sf, background:"#FFF9E6", borderBottom:"1px solid #F0EBE8" }}>Profiles you saved for later — tap Hello to connect</div>
              {maybeProfiles.map(p => {
                const photo = p.photos?.[0] || p.photo_url;
                return (
                  <div key={p.id} onClick={()=>setSelectedMaybeProfile(p)} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 18px", borderBottom:"1px solid #F0EBE8", cursor:"pointer" }}>
                    {photo ? <img src={photo} style={{ width:50, height:50, borderRadius:"50%", objectFit:"cover" }} alt=""/> : <div style={{ width:50, height:50, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>👤</div>}
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{p.first_name}{p.age ? `, ${p.age}` : ''}</div>
                      <div style={{ fontSize:12, color:C.muted, fontFamily:sf }}>{p.location || ''}</div>
                    </div>
                    <span style={{ fontSize:12, color:C.muted, fontFamily:sf }}>View →</span>
                  </div>
                );
              })}
            </div>
          )
        ) : displayHellos.length === 0 ? (
          <div style={{ padding:40, textAlign:"center", color:C.muted, fontSize:14, fontFamily:sf, lineHeight:1.7 }}>
            {tab === 'matches' ? <>💕 No mutual matches yet.<br/>When you both say Hello, you'll appear here and can chat!</> : <>No Hellos yet.<br/>Browse profiles and send some Hellos!</>}
          </div>
        ) : displayHellos.map(h => {
          const mutual = mutualHellos.some(m => m.id === h.id);
          const photo = getProfilePhoto(h);
          return (
            <div key={h.id} onClick={()=>openConvo(h, mutual)} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 18px", borderBottom:"1px solid #F0EBE8", cursor:"pointer", background:mutual?"rgba(200,97,74,0.04)":"transparent" }}>
              <div style={{ position:"relative" }}>
                {photo ? (
                  <img src={photo} style={{ width:50, height:50, borderRadius:"50%", objectFit:"cover", border:mutual?`2px solid ${C.coral}`:"none" }} alt=""/>
                ) : (
                  <div style={{ width:50, height:50, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, border:mutual?`2px solid ${C.coral}`:"none" }}>👤</div>
                )}
                {mutual && <div style={{ position:"absolute", bottom:-2, right:-2, width:18, height:18, borderRadius:"50%", background:C.coral, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10 }}>💕</div>}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{getProfileName(h)}</div>
                <div style={{ fontSize:13, color:mutual?C.coral:C.muted, fontFamily:sf, fontWeight:mutual?600:400 }}>
                  {mutual ? "💕 Mutual match — tap to chat!" : `${h.sender?.location || ""} · Sent you a Hello 👋`}
                </div>
              </div>
              <div style={{ fontSize:11, color:C.muted, fontFamily:sf }}>
                {new Date(h.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short' })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Maybe profile detail modal */}
      {selectedMaybeProfile && (
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", flexDirection:"column", zIndex:10 }}>
          <div style={{ flex:1, overflow:"auto", padding:"20px 20px 16px" }}>
            <button onClick={()=>setSelectedMaybeProfile(null)} style={{ background:C.darkCard, border:"none", borderRadius:"50%", width:36, height:36, color:C.white, fontSize:18, cursor:"pointer", marginBottom:16 }}>✕</button>
            {(selectedMaybeProfile.photos?.[0] || selectedMaybeProfile.photo_url) && (
              <img src={selectedMaybeProfile.photos?.[0] || selectedMaybeProfile.photo_url} alt={selectedMaybeProfile.first_name} onClick={()=>setZoomPhoto(selectedMaybeProfile.photos?.[0] || selectedMaybeProfile.photo_url)} style={{ width:"100%", borderRadius:20, objectFit:"cover", maxHeight:280, marginBottom:16, cursor:"zoom-in" }}/>
            )}
            {selectedMaybeProfile.photos?.length > 1 && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:16 }}>
                {selectedMaybeProfile.photos.slice(1).map((p,i) => (
                  <img key={i} src={p} onClick={()=>setZoomPhoto(p)} style={{ width:"100%", aspectRatio:"1", objectFit:"cover", borderRadius:12, cursor:"zoom-in" }} alt=""/>
                ))}
              </div>
            )}
            <div style={{ fontSize:26, fontWeight:700, color:C.white }}>{selectedMaybeProfile.first_name}{selectedMaybeProfile.age ? `, ${selectedMaybeProfile.age}` : ''}</div>
            <div style={{ fontSize:13, color:C.muted, marginBottom:12, fontFamily:sf }}>📍 {selectedMaybeProfile.location}</div>
            <p style={{ fontSize:14, color:"rgba(255,255,255,0.8)", lineHeight:1.7, fontFamily:sf, whiteSpace:"pre-wrap" }}>{selectedMaybeProfile.bio}</p>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:14, marginBottom:8 }}>
              {(selectedMaybeProfile.interests||[]).map(tag => (
                <span key={tag} style={{ background:C.coralPale, borderRadius:20, padding:"5px 14px", fontSize:12, color:C.coral, fontWeight:600, fontFamily:sf }}>{tag}</span>
              ))}
            </div>
          </div>
          <div style={{ padding:"12px 20px 20px", flexShrink:0, display:"flex", gap:10 }}>
            <button onClick={async()=>{
              await sb.from('maybes').delete().eq('from_user',currentUser.id).eq('to_user',selectedMaybeProfile.id);
              setMaybeProfiles(prev=>prev.filter(x=>x.id!==selectedMaybeProfile.id));
              setSelectedMaybeProfile(null);
            }} style={{ flex:1, padding:"14px", borderRadius:18, background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.muted, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:sf }}>🗑 Remove</button>
            <button onClick={async()=>{
              await sb.rpc('send_hello',{p_from:currentUser.id,p_to:selectedMaybeProfile.id});
              await sb.from('maybes').delete().eq('from_user',currentUser.id).eq('to_user',selectedMaybeProfile.id);
              setMaybeProfiles(prev=>prev.filter(x=>x.id!==selectedMaybeProfile.id));
              setSelectedMaybeProfile(null);
            }} style={{ flex:2, padding:"14px", borderRadius:18, background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, border:"none", color:C.white, fontSize:16, fontWeight:700, cursor:"pointer", fontFamily:sf }}>💕 Hello to {selectedMaybeProfile.first_name}</button>
          </div>
        </div>
      )}

      {/* Zoom modal for Maybe profile photos */}
      {zoomPhoto && (
        <div onClick={()=>setZoomPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, cursor:"zoom-out" }}>
          <button onClick={()=>setZoomPhoto(null)} style={{ position:"absolute", top:16, right:16, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:36, height:36, color:"white", fontSize:18, cursor:"pointer" }}>✕</button>
          <img src={zoomPhoto} style={{ maxWidth:"95vw", maxHeight:"90vh", borderRadius:16, objectFit:"contain" }} alt=""/>
        </div>
      )}
    </div>
  );
}

// ── Create Event Form (separate component to avoid hook rules violation) ──
function CreateEventForm({ currentUser, onBack, onSubmit }) {
  const [f, setFState] = useState({ title:"", date:"", time:"", location:"", area:"", category:"Social", description:"", free:true, price:"", hosted:true, capacity:"" });
  const setF = (k,v) => setFState(p=>({...p,[k]:v}));
  const valid = f.title && f.date && f.time && f.location && f.area && f.description.length >= 20 && (f.free || f.price);
  const submit = async () => {
    if (!valid || !currentUser) return;
    await db.createEvent({ ...f, host_id: currentUser.id, capacity: f.capacity ? parseInt(f.capacity) : null });
    onSubmit();
  };
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white, overflow:"hidden" }}>
      <div style={{ background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, padding:"14px 20px 20px", flexShrink:0 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:C.white, fontSize:22, cursor:"pointer", marginBottom:10, padding:0 }}>←</button>
        <div style={{ fontSize:22, fontWeight:700, color:C.white }}>Create an Event</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.75)", fontFamily:sf, marginTop:4 }}>Only Next Hello members can see your event</div>
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"20px 20px 100px" }}>
        <InputField label="EVENT TITLE" value={f.title} onChange={e=>setF("title",e.target.value)} placeholder="e.g. Sunday Walk in the Park"/>
        <div style={{ display:"flex", gap:10, marginBottom:14 }}>
          <div style={{ flex:1 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:5 }}>DATE</label>
            <input type="date" value={f.date} onChange={e=>setF("date",e.target.value)} style={{ width:"100%", padding:"12px", borderRadius:14, border:"1.5px solid #DDD8D4", outline:"none", fontSize:14, background:C.offWhite, color:C.text, boxSizing:"border-box", fontFamily:sf }}/>
          </div>
          <div style={{ flex:1 }}>
            <label style={{ display:"block", fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:5 }}>TIME</label>
            <input type="time" value={f.time} onChange={e=>setF("time",e.target.value)} style={{ width:"100%", padding:"12px", borderRadius:14, border:"1.5px solid #DDD8D4", outline:"none", fontSize:14, background:C.offWhite, color:C.text, boxSizing:"border-box", fontFamily:sf }}/>
          </div>

  const [uploadingSlot, setUploadingSlot] = useState(null);
  const [profileError, setProfileError] = useState(null);

  useEffect(() => { loadProfile(); }, [currentUser?.id]);

  const loadProfile = async () => {
    if (!currentUser?.id) return;
    setProfileError(null);
    try {
      const { data, error } = await db.getProfile(currentUser.id);
      console.log('loadProfile — id:', currentUser.id, '| data:', data, '| error:', error);
      if (error) { setProfileError(error.message); return; }
      if (data) {
        // Ensure all fields have safe defaults
        const safe = {
          first_name: '', last_name: '', age: '', gender: '',
          interested_in: [], location: '', bio: '', interests: [],
          photos: [], photo_url: null, founding_member: false,
          verified: false, status: 'active',
          ...data
        };
        setProfile(safe); setDraft(safe);
      } else {
        setProfileError('Profile not found. Please contact support.');
      }
    } catch(e) { 
      console.error('loadProfile EXCEPTION:', e);
      setProfileError(e.message + ' (check console for details)'); 
    }
  };

  // Get photos array from profile (up to 6)
  const getPhotos = (p) => {
    if (!p) return [];
    const photos = p.photos || [];
    if (p.photo_url && !photos.includes(p.photo_url)) return [p.photo_url, ...photos].slice(0,6);
    return photos.slice(0,6);
  };

  const handlePhotoUpload = async (e, slotIndex) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadingSlot(slotIndex);
    try {
      const url = await window.uploadPhoto(file);
      const currentPhotos = getPhotos(profile);
      const newPhotos = [...currentPhotos];
      newPhotos[slotIndex] = url;
      const updated = { ...profile, photos: newPhotos, photo_url: newPhotos[0] };
      await db.saveProfile({ ...updated, id: currentUser.id });
      setProfile(updated); setDraft(updated);
    } catch(err) { alert('Photo upload failed. Please try again.'); }
    setUploadingSlot(null);
    e.target.value = '';
  };

  const removePhoto = async (slotIndex) => {
    const currentPhotos = getPhotos(profile);
    const newPhotos = currentPhotos.filter((_,i) => i !== slotIndex);
    const updated = { ...profile, photos: newPhotos, photo_url: newPhotos[0] || null };
    await db.saveProfile({ ...updated, id: currentUser.id });
    setProfile(updated); setDraft(updated);

      </div>

      {zoomPhoto && (
        <div onClick={()=>setZoomPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, cursor:"zoom-out" }}>
          <button onClick={()=>setZoomPhoto(null)} style={{ position:"absolute", top:16, right:16, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:36, height:36, color:"white", fontSize:18, cursor:"pointer" }}>✕</button>
          <img src={zoomPhoto} style={{ maxWidth:"95vw", maxHeight:"90vh", borderRadius:16, objectFit:"contain", boxShadow:"0 8px 40px rgba(0,0,0,0.8)" }} alt=""/>
