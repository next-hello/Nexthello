    </div>
  );
}
// ── Admin Panel ───────────────────────────────────────────
function AdminScreen({ currentUser }) {
  const [adminTab, setAdminTab] = useState('members');
  const [members, setMembers] = useState([]);
  const [reports, setReports] = useState([]);
  const [events, setEvents] = useState([]);
  const [customInterests, setCustomInterests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [selectedMember, setSelectedMember] = useState(null);
  const [messageTarget, setMessageTarget] = useState(null);
  const [messageText, setMessageText] = useState('');
  const [messageSending, setMessageSending] = useState(false);

  const QUICK_MESSAGES = [
    `Hi! Could you please update your profile photo to a clear, recent photo of your face? Members with face photos get far more Hellos! 😊`,
    `Hi! Welcome to Next Hello! Just a heads up — your profile photo doesn't appear to show your face. A clear photo of you makes a huge difference! 📸`,
    `Hi! I noticed you haven't added a profile photo yet. Members with photos get 5× more Hellos — add one in your Profile tab! 😊`,
    `Hi! Just a friendly note from the Next Hello team — please make sure your profile photo shows your face clearly. This helps other members connect with you!`,
  ];

  const sendAdminMessage = async () => {
    if (!messageTarget || !messageText.trim()) return;
    setMessageSending(true);
    try {
      await db.sendMessage({ sender_id: currentUser.id, recipient_id: messageTarget.id, text: `👑 Message from Next Hello founder:\n\n${messageText.trim()}`, read: false });
      showToast(`Message sent to ${messageTarget.first_name} ✅`);
      setMessageTarget(null); setMessageText('');
    } catch(e) { showToast('Failed to send message'); }
    setMessageSending(false);
  };

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2500); };

  useEffect(() => { loadAll(); }, [adminTab]);

  const loadAll = async () => {
    setLoading(true);
    if (adminTab === 'members') {
      const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
      if (data) setMembers(data);
    }
    if (adminTab === 'reports') {
      const { data } = await sb.from('reports').select('*, reporter:profiles!reports_reporter_id_fkey(first_name,last_name), reported:profiles!reports_reported_id_fkey(first_name,last_name)').order('created_at', { ascending: false });
      if (data) setReports(data);
    }
    if (adminTab === 'events') {
      const { data } = await db.getEvents();
      if (data) setEvents(data);
    }
    if (adminTab === 'interests') {
      const { data } = await sb.from('custom_interests').select('*').order('count', { ascending: false });
      if (data) setCustomInterests(data);
    }
    setLoading(false);
  };

  const deleteMember = async (m) => {
    if (!window.confirm(`Delete ${m.first_name} ${m.last_name}? This cannot be undone.`)) return;
    await sb.from('profiles').delete().eq('id', m.id);
    showToast(`${m.first_name} deleted`);
    loadAll();
  };

  const suspendMember = async (m) => {
    await sb.from('profiles').update({ status: 'suspended' }).eq('id', m.id);
    showToast(`${m.first_name} suspended`);
    loadAll();
  };

  const reinstateMember = async (m) => {
    await sb.from('profiles').update({ status: 'active' }).eq('id', m.id);
    showToast(`${m.first_name} reinstated`);
    loadAll();
  };

  const resolveReport = async (r) => {
    await sb.from('reports').update({ status: 'resolved' }).eq('id', r.id);
    showToast('Report marked as resolved');
    loadAll();
  };

  const deleteEvent = async (e) => {
    if (!window.confirm(`Delete event "${e.title}"?`)) return;
    await sb.from('events').delete().eq('id', e.id);
    showToast('Event deleted');
    loadAll();
  };

  const toggleInterestApproval = async (ci) => {
    await sb.from('custom_interests').update({ approved: !ci.approved }).eq('id', ci.id);
    showToast(ci.approved ? 'Interest hidden' : 'Interest approved');
    loadAll();
  };

  const deleteInterest = async (ci) => {
    await sb.from('custom_interests').delete().eq('id', ci.id);
    showToast('Interest deleted');
    loadAll();
  };

  const statusColour = (s) => {
    if (s === 'active') return '#2E7D32';
    if (s === 'suspended') return '#C62828';
    if (s === 'paused') return '#F57F17';
    if (s === 'deactivated') return '#6A1B9A';
    return C.muted;
  };

  const ADMIN_TABS = [
    { id:'members', label:'👥 Members' },
    { id:'reports', label:'🚩 Reports' },
    { id:'events', label:'🎉 Events' },
    { id:'interests', label:'✨ Interests' },

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white, overflow:"hidden" }}>
      {/* Header */}
      <div style={{ background:`linear-gradient(135deg,#1E1C1B,#2A2826)`, padding:"14px 20px 0", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
          <div style={{ fontSize:20 }}>⚡</div>
          <div>
            <div style={{ fontSize:18, fontWeight:700, color:"#FFD700" }}>Admin Panel</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", fontFamily:sf }}>God Mode · {members.length} members</div>
          </div>
        </div>
        {/* Admin tabs */}
        <div style={{ display:"flex", gap:4, overflowX:"auto" }}>
          {ADMIN_TABS.map(t => (
            <button key={t.id} onClick={()=>setAdminTab(t.id)} style={{ padding:"8px 14px", borderRadius:"10px 10px 0 0", background:adminTab===t.id?"#FFD700":"rgba(255,255,255,0.08)", border:"none", color:adminTab===t.id?"#1E1C1B":"rgba(255,255,255,0.6)", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:sf, whiteSpace:"nowrap", flexShrink:0 }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflow:"auto", background:"#F8F6F4" }}>
        {loading ? (
          <div style={{ padding:40, textAlign:"center", color:C.muted, fontFamily:sf }}>Loading...</div>
        ) : (

          // ── MEMBERS ──
          adminTab === 'members' && (
            <div>
              <div style={{ padding:"12px 16px", background:C.white, borderBottom:"1px solid #EAE6E2", fontSize:12, color:C.muted, fontFamily:sf }}>
                {members.length} total members · {members.filter(m=>m.status==='active'||!m.status).length} active · {members.filter(m=>m.status==='suspended').length} suspended

              {members.map(m => (
                <div key={m.id} style={{ background:C.white, borderBottom:"1px solid #F0EBE8", padding:"12px 16px" }}>

                    {m.photo_url ? (
                      <img src={m.photo_url} style={{ width:44, height:44, borderRadius:"50%", objectFit:"cover", flexShrink:0 }} alt=""/>

                      <div style={{ fontWeight:700, fontSize:14, color:C.text }}>{m.first_name} {m.last_name}{m.age?`, ${m.age}`:''}</div>

                      <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                        <span style={{ fontSize:10, fontWeight:700, color:statusColour(m.status||'active'), fontFamily:sf }}>{(m.status||'active').toUpperCase()}</span>

                  {m.bio && <div style={{ fontSize:12, color:C.muted, fontFamily:sf, lineHeight:1.5, marginBottom:8, padding:"8px 10px", background:"#F8F6F4", borderRadius:8, overflow:"hidden", maxHeight:48 }}>{m.bio.substring(0,120)}{m.bio.length>120?'...':''}</div>}
                  {/* Action buttons */}
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {(m.status === 'suspended') ? (
                      <button onClick={()=>reinstateMember(m)} style={{ padding:"5px 12px", borderRadius:20, background:"#E8F5E9", border:"1px solid #A5D6A7", color:"#2E7D32", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>✅ Reinstate</button>
                    ) : m.id !== currentUser?.id && (
                      <button onClick={()=>suspendMember(m)} style={{ padding:"5px 12px", borderRadius:20, background:"#FFF8E1", border:"1px solid #FFD54F", color:"#F57F17", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>⏸ Suspend</button>

                    {m.id !== currentUser?.id && (

                    )}
                    <button onClick={()=>{ setMessageTarget(m); setMessageText(''); }} style={{ padding:"5px 12px", borderRadius:20, background:"#E3F2FD", border:"1px solid #90CAF9", color:"#1565C0", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>💬 Message</button>
                    <button onClick={async()=>{ await sb.from('profiles').update({ founding_member:!m.founding_member }).eq('id',m.id); showToast(m.founding_member?'VIP removed':'VIP granted'); loadAll(); }} style={{ padding:"5px 12px", borderRadius:20, background:"rgba(255,215,0,0.15)", border:"1px solid #FFD700", color:"#B8860B", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>

                <div style={{ fontSize:13, color:C.text, marginBottom:4 }}>
                  <strong>{r.reporter?.first_name} {r.reporter?.last_name}</strong> reported <strong>{r.reported?.first_name} {r.reported?.last_name}</strong>

                <div style={{ fontSize:13, color:C.coral, fontWeight:600, marginBottom:4, fontFamily:sf }}>{r.reason}</div>

                  <div style={{ display:"flex", gap:8 }}>

                    <button onClick={async()=>{ const m = members.find(x=>x.id===r.reported_id); if(m) await suspendMember(m); await resolveReport(r); }} style={{ padding:"6px 14px", borderRadius:20, background:"#FFF8E1", border:"1px solid #FFD54F", color:"#F57F17", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>⏸ Suspend & Resolve</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* ── EVENTS ── */}
        {!loading && adminTab === 'events' && (
          <div>
            <div style={{ padding:"12px 16px", background:C.white, borderBottom:"1px solid #EAE6E2", fontSize:12, color:C.muted, fontFamily:sf }}>{events.length} events</div>
            {events.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:C.muted, fontFamily:sf }}>No events yet</div>
            ) : events.map(e => (
              <div key={e.id} style={{ background:C.white, borderBottom:"1px solid #F0EBE8", padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:C.text, flex:1 }}>{e.title}</div>
                  <button onClick={()=>deleteEvent(e)} style={{ padding:"4px 10px", borderRadius:20, background:"#FFEBEE", border:"1px solid #EF9A9A", color:"#C62828", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf, flexShrink:0 }}>🗑 Delete</button>
                </div>
                <div style={{ fontSize:12, color:C.muted, fontFamily:sf }}>{e.location} · {e.date ? new Date(e.date).toLocaleDateString('en-GB') : '—'}</div>
                {e.description && <div style={{ fontSize:12, color:C.text, fontFamily:sf, marginTop:6, lineHeight:1.5 }}>{e.description.substring(0,100)}{e.description.length>100?'...':''}</div>}
              </div>
            ))}
          </div>
        )}

        {/* ── CUSTOM INTERESTS ── */}
        {!loading && adminTab === 'interests' && (
          <div>
            <div style={{ padding:"12px 16px", background:C.white, borderBottom:"1px solid #EAE6E2", fontSize:12, color:C.muted, fontFamily:sf }}>{customInterests.length} community interests submitted</div>
            {customInterests.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:C.muted, fontFamily:sf }}>No community interests yet</div>
            ) : customInterests.map(ci => (
              <div key={ci.id} style={{ background:C.white, borderBottom:"1px solid #F0EBE8", padding:"12px 16px", display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, fontWeight:600, color:C.text }}>{ci.interest}</div>
                  <div style={{ fontSize:11, color:C.muted, fontFamily:sf }}>Added {ci.count} time{ci.count!==1?'s':''} · {ci.approved?'✅ Visible':'🚫 Hidden'}</div>
                </div>
                <button onClick={()=>toggleInterestApproval(ci)} style={{ padding:"5px 10px", borderRadius:20, background:ci.approved?"#FFF8E1":"#E8F5E9", border:`1px solid ${ci.approved?"#FFD54F":"#A5D6A7"}`, color:ci.approved?"#F57F17":"#2E7D32", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>
                  {ci.approved ? 'Hide' : 'Show'}
                </button>
                <button onClick={()=>deleteInterest(ci)} style={{ padding:"5px 10px", borderRadius:20, background:"#FFEBEE", border:"1px solid #EF9A9A", color:"#C62828", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:sf }}>🗑</button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Message Member Modal */}
      {messageTarget && (
        <div onClick={e=>{if(e.target===e.currentTarget)setMessageTarget(null);}} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:50 }}>
          <div style={{ background:C.white, borderRadius:"22px 22px 0 0", width:"100%", padding:"20px 20px 36px" }}>
            <div style={{ width:40, height:4, background:"#DDD", borderRadius:2, margin:"0 auto 16px" }}/>
            <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:4 }}>Message {messageTarget.first_name}</div>
            <div style={{ fontSize:12, color:C.muted, fontFamily:sf, marginBottom:14 }}>Sent as a direct message from Paul (Next Hello founder)</div>
            <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:8 }}>QUICK MESSAGES</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:14 }}>
              {QUICK_MESSAGES.map((msg, i) => (
                <div key={i} onClick={()=>setMessageText(msg)} style={{ padding:"9px 12px", borderRadius:12, border:`1.5px solid ${messageText===msg?C.coral:"#DDD8D4"}`, background:messageText===msg?C.coralPale:C.white, fontSize:12, color:C.text, cursor:"pointer", fontFamily:sf, lineHeight:1.5 }}>
                  {msg.substring(0, 70)}...
                </div>
              ))}
            </div>
            <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:6 }}>YOUR MESSAGE</div>
            <textarea value={messageText} onChange={e=>setMessageText(e.target.value)} rows={4} placeholder="Type a message..." style={{ width:"100%", padding:"12px 14px", borderRadius:14, border:"1.5px solid #DDD8D4", outline:"none", resize:"none", fontSize:13, background:C.offWhite, color:C.text, boxSizing:"border-box", fontFamily:sf, lineHeight:1.6, marginBottom:12 }}/>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setMessageTarget(null)} style={{ flex:1, padding:"13px", borderRadius:14, background:"none", border:"1.5px solid #DDD8D4", color:C.muted, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:sf }}>Cancel</button>
              <button onClick={sendAdminMessage} disabled={!messageText.trim()||messageSending} style={{ flex:2, padding:"13px", borderRadius:14, background:messageText.trim()?`linear-gradient(135deg,${C.coral},${C.coralMid})`:C.coralPale, border:"none", color:messageText.trim()?C.white:C.muted, fontSize:14, fontWeight:700, cursor:messageText.trim()?"pointer":"default", fontFamily:sf }}>
                {messageSending ? "Sending..." : `Send to ${messageTarget.first_name}`}
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={{ position:"absolute", bottom:90, left:"50%", transform:"translateX(-50%)", background:C.dark, color:C.white, padding:"10px 20px", borderRadius:30, fontSize:13, fontWeight:600, whiteSpace:"nowrap", zIndex:20, fontFamily:sf }}>{toast}</div>}
    </div>
  );
}

const SUGGESTED_QUESTIONS = [
  "How does the Hello system work?",
  "How do I add more photos?",
  "What is VIP Founding Member status?",
  "How do I report someone?",
  "Can I delete my account?",
  "How much does it cost?",
  "How do I create an event?",
  "Why can't I message someone?",
];

function HelpScreen({ onBack, currentUser }) {
  const [messages, setMessages] = useState([
    { role:'assistant', content:`Hi there! 👋 I'm Nell, your Next Hello helper. I know everything about how the app works — ask me anything!\n\nNot sure where to start? Tap one of the suggestions below, or just type your question. 😊` }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const ask = async (question) => {
    const q = question || input.trim();
    if (!q) return;
    setInput('');
    setLoading(true);
    const newMessages = [...messages, { role:'user', content:q }];
    setMessages(newMessages);
    try {
      const res = await fetch("https://gmjipbdvcbmrkqaktguw.supabase.co/functions/v1/claude-proxy", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system: HELP_SYSTEM_PROMPT,
          messages: newMessages.map(m => ({ role:m.role, content:m.content })),
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "I'm not sure about that one! Please email hello@nexthello.co.uk and Paul will help you personally. 😊";
      setMessages(prev => [...prev, { role:'assistant', content:reply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:'assistant', content:"Oops, something went wrong at my end! Please try again or email hello@nexthello.co.uk 😊" }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white, overflow:"hidden" }}>
      <div style={{ background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, padding:"14px 20px 20px", flexShrink:0 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:C.white, fontSize:22, cursor:"pointer", marginBottom:10, padding:0 }}>←</button>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:44, height:44, borderRadius:"50%", background:"rgba(255,255,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🤖</div>
          <div>
            <div style={{ fontSize:18, fontWeight:700, color:C.white }}>Nell — Help Assistant</div>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:"#4CAF50" }}/>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.8)", fontFamily:sf }}>Always here to help</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"16px 16px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start", gap:8, alignItems:"flex-end" }}>
            {m.role==="assistant" && <div style={{ width:28, height:28, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>🤖</div>}
            <div style={{ maxWidth:"78%", padding:"11px 14px", borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px", background:m.role==="user"?`linear-gradient(135deg,${C.coral},${C.coralMid})`:C.offWhite, color:m.role==="user"?C.white:C.text, fontSize:14, lineHeight:1.65, fontFamily:sf, whiteSpace:"pre-wrap" }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"flex-end", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>🤖</div>
            <div style={{ padding:"12px 16px", borderRadius:"18px 18px 18px 4px", background:C.offWhite, display:"flex", gap:4, alignItems:"center" }}>
              {[0,1,2].map(i=><div key={i} style={{ width:7, height:7, borderRadius:"50%", background:C.muted }}/>)}
            </div>
          </div>
        )}
        {messages.length <= 1 && !loading && (
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>
            {SUGGESTED_QUESTIONS.map(q=>(
              <button key={q} onClick={()=>ask(q)} style={{ padding:"8px 14px", borderRadius:20, border:`1.5px solid ${C.coral}`, background:C.coralPale, color:C.coral, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:sf }}>{q}</button>
            ))}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <div style={{ padding:"10px 14px 24px", borderTop:"1px solid #EAE6E2", display:"flex", gap:8, flexShrink:0 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&ask()} placeholder="Ask Nell anything..." style={{ flex:1, padding:"12px 16px", borderRadius:24, border:`1.5px solid #DDD8D4`, outline:"none", fontSize:14, background:C.offWhite, color:C.text, fontFamily:sf }}/>
        <button onClick={()=>ask()} disabled={!input.trim()||loading} style={{ width:44, height:44, borderRadius:"50%", background:input.trim()&&!loading?C.coral:C.coralPale, border:"none", color:input.trim()&&!loading?C.white:C.muted, fontSize:18, cursor:input.trim()&&!loading?"pointer":"default", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
      </div>
    </div>
  );
}

          <span style={{ fontSize:24 }}>💌</span>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.coral, marginBottom:4 }}>My Promise to You</div>
            <p style={{ fontSize:12, color:C.text, fontFamily:sf, margin:0, lineHeight:1.6 }}>Next Hello was built for people like me — over 50, looking for genuine connection. These guidelines keep our community warm, safe, and honest for everyone.</p>
            <p style={{ fontSize:12, color:C.muted, fontFamily:sf, margin:"6px 0 0", fontStyle:"italic" }}>— Paul Halfpenny, Founder</p>
          </div>
        </div>

        <Section title="The Hello System">
          <Rule title="💕 Hello" body="Tap Hello to show you're interested. It adds them to your favourites and lets them know."/>
          <Rule title="👋 Goodbye" body="Tap Goodbye to move on gracefully. The other person is never notified — ever."/>
          <Rule title="💬 Conversations" body="Chat only opens when BOTH of you have said Hello. If someone Hellos you and you're not interested — simply don't respond. No explanation needed."/>
          <Rule title="🔄 Repeated Hellos" body="Sending repeated Hellos after no response is considered harassment and may result in suspension."/>
        </Section>

        <Section title="Community Rules">
          <Rule title="1. Be Genuine" body="Use your real name, real photos, and honest information. You must be aged 50 or over."/>
          <Rule title="2. Be Respectful" body="Treat every member with kindness and respect. Offensive or abusive messages result in immediate removal."/>
          <Rule title="3. Be Safe" body="Never share your home address, financial details, or passwords with another member. Always meet in public first."/>
          <Rule title="4. Be Honest" body="Do not promote a business or solicit money. Romance scamming results in permanent removal and may be reported to police."/>
          <Rule title="5. Keep It Legal" body="No illegal, harmful, sexually explicit, or hateful content. No harassment or stalking."/>
          <Rule title="6. Events" body="Events must be genuinely social and not for personal monetary gain without prior permission from Next Hello."/>
        </Section>

        <Section title="Reporting & Blocking">
          <Rule title="🚩 Report" body="Tap the Report button on any profile. All reports go directly to the founder and are reviewed within 24 hours. Completely confidential."/>
          <Rule title="🚫 Block" body="Block any member instantly. They can never contact you or see your profile. They are never told."/>
        </Section>

        <Section title="What Happens If You Break the Rules">
          {[["⚠️ Warning","Private message for minor issues"],["⏸ Suspension","7–30 day removal for repeated issues"],["🚫 Permanent Ban","Immediate removal for scamming, abuse, or illegal content"]].map(([e,b])=>(
            <Rule key={e} title={e} body={b}/>
          ))}
        </Section>

        <Section title="VIP Founding Member Status">
          <p style={{ fontSize:13, color:C.text, fontFamily:sf, lineHeight:1.7, marginBottom:10 }}>Members who join before 1st June 2026 receive <strong>VIP Founding Member status for one full year</strong> — including free membership.</p>
          <p style={{ fontSize:13, color:C.text, fontFamily:sf, lineHeight:1.7 }}>This is only removed if you delete your account or break these guidelines. After one year, membership is £5/month — pay as you go, cancel anytime.</p>
          <p style={{ fontSize:12, color:C.muted, fontFamily:sf, lineHeight:1.6, marginTop:8, fontStyle:"italic" }}>This is my personal promise. — Paul</p>
        </Section>

        <div style={{ background:C.offWhite, borderRadius:14, padding:"14px 16px", textAlign:"center" }}>
          <p style={{ fontSize:12, color:C.muted, fontFamily:sf, margin:0, lineHeight:1.6 }}>Questions or concerns?<br/><span style={{ color:C.coral, fontWeight:600 }}>hello@nexthello.co.uk</span></p>
          <p style={{ fontSize:11, color:"#CCC", fontFamily:sf, margin:"8px 0 0" }}>© 2026 Next Hello. All rights reserved.</p>
        </div>
      </div>
    </div>
  );
}

// ── Safety Screen ─────────────────────────────────────────
function SafetyScreen() {
  const TIPS=[{e:"🛡️",t:"Trust your instincts",b:"If something feels off, it probably is. Don't feel pressured to continue any interaction that makes you uncomfortable."},{e:"🏙️",t:"Meet in public",b:"Always choose a busy, public place for your first few meetings."},{e:"📍",t:"Tell a friend",b:"Let someone you trust know where you're going, who you're meeting, and when you expect to be back."},{e:"🔒",t:"Protect your data",b:"Never share your home address, workplace, financial details, or passwords with someone you've just met."},{e:"🚗",t:"Your own transport",b:"Arrange your own way to and from a date so you're never dependent on someone you've just met."},{e:"📱",t:"Stay charged",b:"Keep your phone charged before a date so you can always call for help if needed."}];
  return (
    <div style={{ flex:1, background:C.coralPale, overflow:"auto" }}>
      <div style={{ padding:"16px 20px 10px" }}><div style={{ fontSize:26, fontWeight:700, color:C.coral }}>Safety Tips</div><div style={{ fontSize:13, color:C.muted, fontFamily:sf, marginTop:2 }}>Your safety is our priority at Next Hello.</div></div>
      <div style={{ padding:"0 14px 20px", display:"flex", flexDirection:"column", gap:10 }}>
        {TIPS.map((tip,i)=>(
          <div key={i} style={{ background:C.white, borderRadius:16, padding:"14px 16px", display:"flex", alignItems:"flex-start", gap:14, boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
            <div style={{ width:44, height:44, borderRadius:"50%", background:C.coralPale, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{tip.e}</div>
            <div><div style={{ fontWeight:700, fontSize:15, color:C.text, marginBottom:3 }}>{tip.t}</div><div style={{ fontSize:13, color:"#555", lineHeight:1.55, fontFamily:sf }}>{tip.b}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("splash");
  const [tab, setTab] = useState("browse");
  const [currentUser, setCurrentUser] = useState(null);
  const [prefs, setPrefs] = useState({ interestedIn:["Everyone"], ageMin:50, ageMax:85, interests:[], gender:'' });
  const [helloCount, setHelloCount] = useState(0);
  const [loading, setLoading] = useState(true);

  const loadUserPrefs = async (user) => {
    if (!user) return;
    const { data: profile } = await db.getProfile(user.id);
    if (profile) {
      setPrefs({
        interestedIn: profile.interested_in || ['Everyone'],
        ageMin: profile.age_min || 50,
        ageMax: profile.age_max || 85,
        interests: profile.interests || [],
        gender: profile.gender || '',
      });
    }
  };

  useEffect(() => {
    // Check if already logged in
    auth.getUser().then(({ data }) => {
      if (data?.user) { setCurrentUser(data.user); loadUserPrefs(data.user); setScreen("app"); }
      setLoading(false);
    });
    // Listen for auth changes
    const { data: { subscription } } = auth.onAuthChange((event, session) => {
      if (session?.user) { setCurrentUser(session.user); loadUserPrefs(session.user); setScreen("app"); }
      else { setCurrentUser(null); setScreen("splash"); }
    });
    return () => subscription?.unsubscribe();
  }, []);

  const handleSignOut = async () => {
    await auth.signOut();
    setCurrentUser(null);
    setScreen("splash");
    setTab("browse");
  };

// ── Photo Upload Screen (mandatory after registration) ────
function PhotoUploadScreen({ currentUser, onDone }) {
  const [photos, setPhotos] = useState([]);
  const [uploadingSlot, setUploadingSlot] = useState(null);
  const [creating, setCreating] = useState(false);
  const [err, setErr] = useState('');
  const [zoomPhoto, setZoomPhoto] = useState(null);

  // Save photos array + photo_url together — same pattern as ProfileScreen
  const savePhotos = async (newPhotos) => {
    await sb.from('profiles').update({
      photos: newPhotos,
      photo_url: newPhotos[0] || null,
    }).eq('id', currentUser.id);
  };

  const handlePhotoUpload = async (e, slotIndex) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploadingSlot(slotIndex); setErr('');
    try {
      const url = await window.uploadPhoto(file);
      const newPhotos = [...photos];
      newPhotos[slotIndex] = url;
      const cleaned = newPhotos.filter(Boolean);
      await savePhotos(cleaned);
      setPhotos(cleaned);
    } catch(e) { setErr('Upload failed. Please try again.'); }
    setUploadingSlot(null);
    e.target.value = '';
  };

  const removePhoto = async (slotIndex) => {
    const newPhotos = photos.filter((_,i) => i !== slotIndex);
    await savePhotos(newPhotos);
    setPhotos(newPhotos);
  };

  const handleCreateProfile = async () => {
    setCreating(true);
    try {
      const { data: profile } = await sb.from('profiles').select('first_name, last_name, age').eq('id', currentUser.id).maybeSingle();
      const firstName = profile?.first_name || '';
      const lastName = profile?.last_name || '';
      const age = profile?.age || 'not provided';
      const email = currentUser.email;
      const isFoundingMember = new Date() < new Date('2026-06-01');
      const signupTime = new Date().toLocaleString('en-GB', { dateStyle:'full', timeStyle:'short' });
      window.sendEmail(email, `Welcome to Next Hello, ${firstName}! 💕`,
        `<div style="font-family:Georgia,serif;max-width:520px;margin:0 auto;padding:32px 24px;background:#1E1C1B;color:#FAFAF8;border-radius:16px;">
          <div style="font-size:11px;letter-spacing:0.2em;color:#C8614A;margin-bottom:4px;">N E X T</div>
          <div style="font-size:36px;font-weight:700;color:#FAFAF8;margin-bottom:24px;">Hello</div>
          <p style="font-size:19px;color:#F0DDD4;margin-bottom:6px;">Hi ${firstName}! 👋</p>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:16px;">Welcome to Next Hello — and congratulations on being one of our very first members! 🎉</p>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:16px;">I'm Paul, the founder. Not a faceless corporation with a ping pong table and a juice bar. Just someone who got fed up with expensive, impersonal dating sites and decided to do something about it.</p>
          ${isFoundingMember ? `<div style="background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);border-radius:12px;padding:14px 18px;margin-bottom:16px;"><p style="font-size:14px;color:#FFD700;margin:0;line-height:1.7;">👑 <strong>You're a VIP Founding Member</strong> — Next Hello is completely free for you for a full 12 months.</p></div>` : ''}
          <p style="font-size:14px;color:rgba(255,255,255,0.8);line-height:1.8;margin-bottom:16px;">
            💕 <strong style="color:#fff;">Browse and say Hello</strong> to anyone who catches your eye<br/>
            👋 <strong style="color:#fff;">Not interested?</strong> Just say Goodbye — they'll never know<br/>
            🎉 <strong style="color:#fff;">Check out Events</strong> — meet members in real life
          </p>
          <a href="https://app.nexthello.co.uk" style="display:inline-block;background:linear-gradient(135deg,#C8614A,#D4775F);color:white;padding:14px 28px;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px;">Go to Next Hello →</a>
          <p style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:28px;line-height:1.75;">Welcome aboard. One Hello really can change everything. 💕<br/><br/><strong style="color:#F0DDD4;">Paul x</strong></p>
        </div>`
      ).catch(e => console.log('Welcome email failed:', e));
      window.sendEmail('pbhalfpenny@icloud.com', `🎉 New member joined Next Hello`,
        `<div style="font-family:Georgia,serif;max-width:500px;margin:0 auto;padding:28px 24px;background:#1E1C1B;color:#FAFAF8;border-radius:16px;">
          <div style="font-size:28px;font-weight:700;color:#FAFAF8;margin-bottom:20px;">New Member Alert 🎉</div>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Name:</strong> ${firstName} ${lastName}</p>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Email:</strong> ${email}</p>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Age:</strong> ${age}</p>
          <p style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.75;margin-bottom:8px;"><strong style="color:#fff;">Signed up:</strong> ${signupTime}</p>
          ${isFoundingMember ? `<p style="font-size:14px;color:#FFD700;margin-top:12px;">👑 VIP Founding Member</p>` : ''}
        </div>`
      ).catch(e => console.log('Admin notification failed:', e));
    } catch(e) { console.log('Profile fetch for email failed:', e); }
    setCreating(false);
    onDone();
  };

  const hasMainPhoto = photos.length > 0;

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", background:C.white }}>
      <div style={{ background:`linear-gradient(135deg,${C.coral},${C.coralMid})`, padding:"24px 24px 20px" }}>
        <div style={{ fontSize:24, fontWeight:700, color:C.white, marginBottom:4 }}>Set up your photos</div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.8)", fontFamily:sf }}>Add at least one photo to continue. You can add up to 6.</div>
      </div>
      <div style={{ flex:1, overflow:"auto", padding:"20px 20px 16px", display:"flex", flexDirection:"column", gap:16 }}>

        {/* Photo grid — same as ProfileScreen */}
        <div>
          <div style={{ fontSize:11, fontWeight:600, color:C.coral, letterSpacing:"0.08em", fontFamily:sf, marginBottom:8 }}>MY PHOTOS <span style={{ color:C.muted, fontWeight:400 }}>({photos.length}/6)</span></div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[0,1,2,3,4,5].map(i => {
              const hasPhoto = !!photos[i];
              return (
                <div key={i} style={{ aspectRatio:"1", borderRadius:14, overflow:"hidden", position:"relative", background:C.offWhite, border:`2px dashed ${hasPhoto?"transparent":"#DDD8D4"}`, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {hasPhoto ? (
                    <>
                      <img src={photos[i]} onClick={()=>setZoomPhoto(photos[i])} style={{ width:"100%", height:"100%", objectFit:"cover", cursor:"zoom-in" }} alt=""/>
                      {i===0 && <div style={{ position:"absolute", bottom:4, left:4, background:C.coral, borderRadius:8, padding:"2px 6px", fontSize:9, color:C.white, fontWeight:700, fontFamily:sf }}>MAIN</div>}
                      <button onClick={()=>removePhoto(i)} style={{ position:"absolute", top:4, right:4, width:20, height:20, borderRadius:"50%", background:"rgba(0,0,0,0.6)", border:"none", color:C.white, fontSize:11, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                    </>
                  ) : (
                    <label style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                      {uploadingSlot===i ? (
                        <div style={{ fontSize:18, color:C.muted }}>⏳</div>
                      ) : (
                        <>
                          <div style={{ fontSize:22, color:"#CCC", marginBottom:2 }}>+</div>
                          <div style={{ fontSize:9, color:C.muted, fontFamily:sf }}>{i===0?"Add photo":"Add"}</div>
                        </>
                      )}
                      <input type="file" accept="image/*" onChange={e=>handlePhotoUpload(e,i)} style={{ display:"none" }}/>
                    </label>
                  )}
                </div>
              );
            })}
          </div>
          <p style={{ fontSize:11, color:C.muted, fontFamily:sf, marginTop:8, textAlign:"center", lineHeight:1.5 }}>📸 Tap + to add · Tap ✕ to remove · First photo is your main profile photo</p>
        </div>

        {err && <p style={{ fontSize:13, color:C.coral, fontFamily:sf, textAlign:"center", margin:0 }}>{err}</p>}

        {!hasMainPhoto && (
          <div style={{ background:"#FFF8F0", border:"1.5px solid #FFD580", borderRadius:14, padding:"12px 16px" }}>
            <p style={{ fontSize:13, color:"#5D4E00", fontFamily:sf, margin:0, lineHeight:1.7, textAlign:"center" }}>
              Please add at least one photo to continue.<br/>
              <span style={{ fontSize:12, color:"#B8860B" }}>Smiling photos get the most Hellos! 😄</span>
            </p>
          </div>
        )}
      </div>

      <div style={{ padding:"12px 20px 28px", borderTop:"1px solid #EAE6E2", flexShrink:0, display:"flex", flexDirection:"column", gap:10 }}>
        <Btn onClick={hasMainPhoto ? handleCreateProfile : null} disabled={!hasMainPhoto || creating}>
          {creating ? "Creating your profile..." : hasMainPhoto ? "Create Profile →" : "Add a photo to continue"}
        </Btn>
        <button onClick={onDone} style={{ background:"none", border:"none", color:C.muted, fontSize:13, fontFamily:sf, cursor:"pointer", padding:"6px" }}>
          Skip for now (you can add photos later)
        </button>
      </div>

      {zoomPhoto && (
        <div onClick={()=>setZoomPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, cursor:"zoom-out" }}>
          <button onClick={()=>setZoomPhoto(null)} style={{ position:"absolute", top:16, right:16, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:36, height:36, color:"white", fontSize:18, cursor:"pointer" }}>✕</button>
          <img src={zoomPhoto} style={{ maxWidth:"95vw", maxHeight:"90vh", borderRadius:16, objectFit:"contain" }} alt=""/>
        </div>
      )}
    </div>
  );
}

  if (loading) return (
    <PhoneShell bg={C.dark}>
      <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
        <div style={{ display:"flex", gap:3 }}>{[0,1,2].map(i=><div key={i} style={{ width:3.5, height:16, background:C.coral, borderRadius:2 }}/>)}</div>
        <div style={{ fontSize:13, color:C.muted, fontFamily:sf }}>Loading Next Hello...</div>
      </div>
    </PhoneShell>
  );

  const handleRegisterSuccess = (newPrefs) => {
    if (newPrefs) setPrefs(newPrefs);
    setScreen("photo");
  };

  const darkBg = tab === "browse";
  const safeBg = tab === "safety";

  if (screen === "splash") return <PhoneShell bg={C.dark}><StatusBar/><SplashScreen onLogin={()=>setScreen("login")} onRegister={()=>setScreen("onboarding-reg")}/></PhoneShell>;
  if (screen === "onboarding-reg") return <PhoneShell bg={C.dark}><StatusBar/><OnboardingScreens onDone={()=>setScreen("register")} ctaText="Create My Profile →"/></PhoneShell>;
  if (screen === "login") return <PhoneShell bg={C.white}><StatusBar light/><LoginScreen onBack={()=>setScreen("splash")} onSuccess={()=>setScreen("app")}/></PhoneShell>;
  if (screen === "register") return <PhoneShell bg={C.white}><StatusBar light/><RegisterScreen onBack={()=>setScreen("splash")} onSuccess={handleRegisterSuccess}/></PhoneShell>;
  if (screen === "photo") return <PhoneShell bg={C.white}><StatusBar light/><PhotoUploadScreen currentUser={currentUser} onDone={()=>setScreen("app")}/></PhoneShell>;
  if (screen === "onboarding") return <PhoneShell bg={C.dark}><StatusBar/><OnboardingScreens onDone={()=>setScreen("app")}/></PhoneShell>;
  if (screen === "rules") return <PhoneShell bg={C.white}><StatusBar light/><RulesScreen onBack={()=>setScreen("app")}/></PhoneShell>;
  if (screen === "help") return <PhoneShell bg={C.white}><StatusBar light/><HelpScreen onBack={()=>setScreen("app")} currentUser={currentUser}/></PhoneShell>;

  return (
    <PhoneShell bg={darkBg?C.dark:safeBg?C.coralPale:C.white}>
      <StatusBar light={!darkBg&&!safeBg}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {tab==="browse" && currentUser?.id && <BrowseScreen currentUser={currentUser} prefs={prefs}/>}
        {tab==="hellos" && currentUser?.id && <HellosScreen currentUser={currentUser}/>}
        {tab==="events" && currentUser?.id && <EventsScreen currentUser={currentUser}/>}
        {tab==="offers" && <OffersScreen/>}
        {tab==="safety" && <SafetyScreen/>}
        {tab==="admin" && currentUser?.id && isGodMode(currentUser) && <AdminScreen currentUser={currentUser}/>}
        {tab==="profile" && currentUser?.id && <ProfileScreen currentUser={currentUser} onSignOut={handleSignOut} onViewIntro={()=>setScreen("onboarding")} onViewRules={()=>setScreen("rules")} onViewHelp={()=>setScreen("help")} onPrefsUpdated={loadUserPrefs}/>}
      </div>
      <BottomNav active={tab} setActive={setTab} darkBg={darkBg} helloCount={helloCount} isFounder={isGodMode(currentUser)}/>
    </PhoneShell>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
